<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Frota · Torre de Controle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#EEF1F8;
  --s1:#ffffff;
  --s2:#f8f9fb;
  --s3:#f1f3f7;
  --canvas:#f8f9fb;
  --border:#e8ecf2;
  --b2:#dde2ea;
  --b3:#c4ccd8;
  --t1:#0D0F12;
  --t2:#6B7280;
  --t3:#9CA3AF;
  --t4:#C4CDD8;
  --blue:#2563eb;
  --blue-s:#eff6ff;
  --blue-m:rgba(37,99,235,.15);
  --red:#dc2626;
  --red-s:#fff5f5;
  --amber:#d97706;
  --amber-s:#fffbeb;
  --amber-m:rgba(217,119,6,.15);
  --green:#16a34a;
  --green-s:#f0fdf4;
  --green-m:rgba(22,163,74,.15);
  --orange:#ea580c;
  --orange-s:#fff7ed;
  --f-u:'Plus Jakarta Sans',sans-serif;
  --f-m:monospace;
  --radius-sm:4px;
  --radius-md:6px;
  --radius-base:8px;
  --radius-lg:10px;
  --radius-xl:14px;
  --radius-full:9999px;
  --elev-1:0 1px 3px rgba(15,23,42,.07),0 1px 2px rgba(15,23,42,.04);
  --elev-2:0 4px 12px rgba(15,23,42,.1),0 2px 4px rgba(15,23,42,.06);
  --elev-3:0 8px 24px rgba(15,23,42,.14),0 4px 8px rgba(15,23,42,.08);
}

html,body{
  height:100%;
  font-family:var(--f-u);
  background:var(--bg);
  color:var(--t1);
  font-size:11px;
  overflow:hidden;
}

a{text-decoration:none;color:inherit}
button{font-family:var(--f-u);cursor:pointer;border:none;background:none}

/* ── TOPBAR ──────────────────────────────────────────────────────── */
.topbar{
  height:46px;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:12px;
  position:relative;
  z-index:30;
  box-shadow:var(--elev-1);
  flex-shrink:0;
}

.logo-badge{
  width:32px;
  height:32px;
  border-radius:var(--radius-base);
  background:var(--blue);
  color:#fff;
  font-size:10px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  letter-spacing:.5px;
  flex-shrink:0;
}

.breadcrumb{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:var(--t2);
}
.breadcrumb a{color:var(--t2);transition:color .15s}
.breadcrumb a:hover{color:var(--blue)}
.breadcrumb .sep{color:var(--t4);font-size:10px}
.breadcrumb .current{color:var(--t1);font-weight:600}

.topbar-spacer{flex:1}

/* ── KPI STRIP — mesmo componente da Operacional ───────────────── */
.kpi-strips-wrap{display:flex;align-items:stretch;height:100%}
.kpi-strip{
  display:flex;align-items:stretch;gap:0;
  overflow-x:auto;padding:0 12px;
}
.kpi-strip::-webkit-scrollbar{height:0}
.kpi-group{display:flex;flex-direction:column;justify-content:stretch;padding:0}
.kpi-group-label{
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--t3);padding:8px 14px 0;line-height:1;opacity:.75;
}
.kpi-group-items{display:flex;align-items:stretch;gap:6px;padding:4px 10px 6px}
.kpi-group-divider{
  width:1px;margin:10px 6px;
  background:linear-gradient(to bottom,transparent,var(--border) 20%,var(--border) 80%,transparent);
}
.kpi{
  appearance:none;font:inherit;color:inherit;text-align:left;
  display:flex;flex-direction:column;justify-content:center;
  padding:5px 14px 6px;min-width:80px;
  background:var(--s1);
  border:1px solid var(--b2);border-radius:var(--radius-md);
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 1px 0 rgba(15,23,42,.03),0 2px 4px rgba(15,23,42,.05);
  transition:background .15s,border-color .15s,transform .12s,box-shadow .15s;
}
.kpi:hover{border-color:var(--b3);transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,23,42,.10)}
.kpi:active{transform:translateY(0)}
.kpi[aria-pressed="true"]{
  border-color:var(--blue) !important;
  box-shadow:0 0 0 2px rgba(37,99,235,.15),0 2px 4px rgba(15,23,42,.05) !important;
}
.kpi-val{font-family:var(--f-m);font-weight:900;font-size:20px;line-height:1;letter-spacing:-.01em}
.kpi-lbl{font-size:9px;font-weight:500;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin-top:3px;white-space:nowrap}
/* left accent bar */
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:currentColor;opacity:0;transition:opacity .15s}
/* semantic states */
.kpi.danger .kpi-val{color:var(--red)}
.kpi.danger::before,.kpi.warn::before{opacity:1}
.kpi.danger{background:linear-gradient(180deg,#fff 0%,#FFF5F6 100%);border-color:rgba(220,38,38,.22)}
.kpi.danger::before{background:var(--red)}
.kpi.warn .kpi-val{color:var(--amber)}
.kpi.warn{background:linear-gradient(180deg,#fff 0%,#FFFBF1 100%);border-color:rgba(217,119,6,.22)}
.kpi.warn::before{background:var(--amber)}
.kpi.ok .kpi-val{color:var(--green)}
.kpi.ok{background:linear-gradient(180deg,#fff 0%,#F3FBF5 100%);border-color:rgba(22,163,74,.22)}
.kpi.neutral .kpi-val{color:var(--t1)}

/* ── STATUS DOTS — mesmo padrão rc-dot da Operacional ──────────── */
.rc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}70%{box-shadow:0 0 0 5px rgba(22,163,74,0)}}
.rc-dot.fs-em_rota{animation:pulse-dot 2s ease-in-out infinite}
.fs-em_rota{background:var(--green)}
.fs-disponivel{background:var(--blue)}
.fs-manutencao{background:var(--amber)}
.fs-offline{background:var(--t4)}

.btn-refresh{
  display:flex;
  align-items:center;
  gap:6px;
  padding:0 12px;
  height:30px;
  border-radius:var(--radius-md);
  font-size:11px;
  font-weight:600;
  background:var(--s2);
  border:1px solid var(--border);
  color:var(--t2);
  cursor:pointer;
  transition:all .15s;
}
.btn-refresh:hover{background:var(--s1);border-color:var(--b2);color:var(--t1)}
.btn-refresh.spinning i{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOOLBAR ─────────────────────────────────────────────────────── */
.toolbar{
  height:40px;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 12px;
  gap:8px;
  flex-shrink:0;
}

.search-wrap{
  position:relative;
  display:flex;
  align-items:center;
}
.search-wrap i{
  position:absolute;
  left:9px;
  color:var(--t3);
  font-size:11px;
  pointer-events:none;
}
.search-input{
  height:28px;
  padding:0 10px 0 28px;
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  font-family:var(--f-u);
  font-size:11px;
  color:var(--t1);
  background:var(--s2);
  width:200px;
  transition:all .15s;
}
.search-input::placeholder{color:var(--t3)}
.search-input:focus{outline:none;border-color:var(--blue);background:var(--s1);box-shadow:0 0 0 3px var(--blue-m)}

.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px}

.select-group{
  height:28px;
  padding:0 10px;
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  font-family:var(--f-u);
  font-size:11px;
  color:var(--t1);
  background:var(--s2);
  cursor:pointer;
}
.select-group:focus{outline:none;border-color:var(--blue)}

/* Sub-status chips — padrão pf-chip da Operacional */
.substatus-chips{display:flex;align-items:center;gap:5px}
.ss-chip{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:500;
  padding:5px 11px;border-radius:var(--radius-md);cursor:pointer;
  border:1px solid var(--border);color:var(--t2);background:transparent;
  transition:all .12s;user-select:none;
}
.ss-chip:hover{border-color:var(--b2);color:var(--t1);background:var(--s2)}
.ss-chip.active{background:var(--blue-s);border-color:var(--blue);color:var(--blue);font-weight:600}

.toolbar-spacer{flex:1}

.view-toggle{
  display:flex;
  align-items:center;
  gap:2px;
  background:var(--s3);
  border-radius:var(--radius-md);
  padding:2px;
  border:1px solid var(--border);
}
.vt-btn{
  width:28px;
  height:24px;
  border-radius:var(--radius-sm);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:var(--t3);
  cursor:pointer;
  transition:all .15s;
}
.vt-btn:hover{color:var(--t2)}
.vt-btn.active{background:var(--s1);color:var(--blue);box-shadow:var(--elev-1)}

/* ── MAIN LAYOUT ─────────────────────────────────────────────────── */
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

.main-content{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* TABLE PANEL */
.table-panel{
  width:480px;
  flex-shrink:0;
  background:var(--s1);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition:width .25s ease;
}
.table-panel.hidden{width:0;border:none;overflow:hidden}

.table-header{
  display:flex;
  align-items:center;
  height:32px;
  background:var(--s3);
  border-bottom:1px solid var(--border);
  padding:0 8px;
  flex-shrink:0;
}
.th-cell{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:9px;
  font-weight:700;
  color:var(--t3);
  text-transform:uppercase;
  letter-spacing:.6px;
  cursor:pointer;
  user-select:none;
  padding:0 4px;
  white-space:nowrap;
}
.th-cell:hover{color:var(--t2)}
.th-cell.sorted{color:var(--blue)}
.th-cell i{font-size:8px;opacity:.7}
.th-status{width:28px;flex-shrink:0}
.th-vehicle{flex:1;min-width:120px}
.th-driver{width:110px;flex-shrink:0}
.th-statuslbl{width:90px;flex-shrink:0}
.th-fuel{width:56px;flex-shrink:0;text-align:right;justify-content:flex-end}
.th-updated{width:72px;flex-shrink:0;text-align:right;justify-content:flex-end}

.table-body{
  overflow-y:auto;
  flex:1;
}
.table-body::-webkit-scrollbar{width:4px}
.table-body::-webkit-scrollbar-track{background:transparent}
.table-body::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.vrow{
  display:flex;
  align-items:center;
  height:40px;
  padding:0 8px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .1s;
  border-left:3px solid transparent;
}
.vrow:hover{background:var(--blue-s)}
.vrow.selected{
  background:var(--blue-s);
  border-left-color:var(--blue);
}

.vr-status{width:25px;flex-shrink:0;display:flex;align-items:center}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.vr-vehicle{flex:1;min-width:0;padding:0 4px}
.vr-driver{width:110px;flex-shrink:0;padding:0 4px}
.vr-statuslbl{width:90px;flex-shrink:0}
.slbl{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);white-space:nowrap}
.slbl-green{background:var(--green-s);color:var(--green)}
.slbl-blue{background:var(--blue-s);color:var(--blue)}
.slbl-amber{background:var(--amber-s);color:var(--amber)}
.slbl-red{background:var(--red-s);color:var(--red)}
.slbl-gray{background:var(--s3);color:var(--t3)}
.vr-fuel{width:56px;flex-shrink:0;text-align:right}
.vr-updated{width:72px;flex-shrink:0;text-align:right;font-size:10px;color:var(--t3)}

.vr-plate{font-weight:700;font-size:11px;color:var(--t1);font-family:var(--f-m)}
.vr-model{font-size:9px;color:var(--t3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.vr-dname{font-size:10px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.fuel-bar-wrap{display:flex;align-items:center;gap:3px;justify-content:flex-end}
.fuel-bar{width:32px;height:4px;border-radius:2px;background:var(--s3);overflow:hidden}
.fuel-fill{height:100%;border-radius:2px;transition:width .3s}
.fuel-val{font-size:9px;font-family:var(--f-m);color:var(--t3);min-width:24px;text-align:right}

.status-badge{
  font-size:8px;
  font-weight:700;
  padding:1px 5px;
  border-radius:var(--radius-sm);
  text-transform:uppercase;
  letter-spacing:.4px;
}

/* MAP PANEL */
.map-panel{
  flex:1;
  position:relative;
  overflow:hidden;
  z-index:1; /* stacking context: confina z-indices internos do Leaflet (200-700) */
}
.map-panel.hidden{display:none}
#fleet-map{
  width:100%;
  height:100%;
  background:var(--bg);
}

/* DETAIL PANEL */
.detail-panel{
  position:fixed;
  top:0;
  right:-380px;
  width:360px;
  height:100vh;
  background:var(--s1);
  border-left:1px solid var(--border);
  box-shadow:var(--elev-3);
  z-index:1000; /* acima do stacking context do Leaflet */
  display:flex;
  flex-direction:column;
  transition:right .25s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.detail-panel.open{right:0}

.dp-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 14px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.dp-plate{font-size:16px;font-weight:800;font-family:var(--f-m);color:var(--t1);letter-spacing:.5px}
.dp-model{font-size:10px;color:var(--t3);margin-top:2px}
.dp-header-info{flex:1;min-width:0}
.dp-close{
  width:28px;
  height:28px;
  border-radius:var(--radius-md);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:var(--t3);
  cursor:pointer;
  background:var(--s3);
  border:1px solid var(--border);
  transition:all .15s;
  flex-shrink:0;
}
.dp-close:hover{background:var(--red-s);color:var(--red);border-color:rgba(220,38,38,.2)}

.dp-actions{
  display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.dp-action-btn{
  flex:1;height:30px;display:flex;align-items:center;justify-content:center;gap:5px;
  border-radius:var(--radius-md);border:1px solid var(--border);background:var(--s2);
  color:var(--t2);font-family:var(--f-u);font-size:10px;font-weight:600;cursor:pointer;
  transition:all .15s;
}
.dp-action-btn:hover{background:var(--s1);border-color:var(--b2);color:var(--t1)}
.dp-action-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.dp-action-btn.primary:hover{background:#1d4ed8}
.dp-action-btn i{font-size:10px}

.dp-scroll{
  flex:1;
  overflow-y:auto;
  padding:12px 14px;
}
.dp-scroll::-webkit-scrollbar{width:3px}
.dp-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.dp-section{
  margin-bottom:14px;
}
.dp-section-title{
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.7px;
  color:var(--t3);
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:6px;
}
.dp-section-title::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

.dp-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
}
.dp-label{font-size:9px;color:var(--t3);min-width:72px;flex-shrink:0;font-weight:500}
.dp-value{font-size:11px;color:var(--t2);font-weight:500}
.dp-value.mono{font-family:var(--f-m);font-size:11px}
.dp-value.strong{color:var(--t1);font-weight:600}

.chip{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:2px 8px;
  border-radius:var(--radius-full);
  font-size:10px;
  font-weight:600;
}
.chip-green{background:var(--green-s);color:var(--green)}
.chip-blue{background:var(--blue-s);color:var(--blue)}
.chip-orange{background:var(--orange-s);color:var(--orange)}
.chip-red{background:var(--red-s);color:var(--red)}
.chip-gray{background:var(--s3);color:var(--t3)}

.fuel-big{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.fuel-big-bar{
  height:6px;
  background:var(--s3);
  border-radius:3px;
  overflow:hidden;
}
.fuel-big-fill{height:100%;border-radius:3px;transition:width .3s}
.fuel-big-labels{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.fuel-big-val{font-size:12px;font-weight:700;font-family:var(--f-m)}
.fuel-big-odo{font-size:10px;color:var(--t3)}

.sm-card{
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:var(--radius-base);
  padding:10px;
}
.sm-id{font-size:10px;font-weight:700;color:var(--blue);font-family:var(--f-m);margin-bottom:4px}
.sm-client{font-size:11px;font-weight:600;color:var(--t1);margin-bottom:6px}
.sm-cargo{font-size:10px;color:var(--t2);margin-bottom:8px}
.sm-route{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:10px;
  color:var(--t2);
  margin-bottom:8px;
}
.sm-route i{color:var(--t4);font-size:9px}
.sm-route .origin{color:var(--t1);font-weight:500}
.sm-route .dest{color:var(--blue);font-weight:500}

.progress-wrap{
  display:flex;
  flex-direction:column;
  gap:3px;
}
.progress-bar{
  height:5px;
  background:var(--s3);
  border-radius:3px;
  overflow:hidden;
  border:1px solid var(--border);
}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-labels{
  display:flex;
  justify-content:space-between;
  font-size:9px;
  color:var(--t3);
}
.progress-labels .pct{font-weight:700;color:var(--t2)}

.sm-eta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:8px;
  padding-top:8px;
  border-top:1px solid var(--border);
}
.sm-eta-label{font-size:9px;color:var(--t3)}
.sm-eta-val{font-size:12px;font-weight:700;color:var(--t1);font-family:var(--f-m)}

.manut-card{
  background:var(--amber-s);
  border:1px solid rgba(217,119,6,.2);
  border-radius:var(--radius-base);
  padding:10px;
}
.manut-title{font-size:10px;font-weight:700;color:var(--amber);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.manut-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px}
.manut-row .mkey{color:var(--t3)}
.manut-row .mval{color:var(--t1);font-weight:600}

/* VIEW MODES */
.app.view-map .table-panel{display:none}
.app.view-table .map-panel{display:none}

/* TABLE FULL */
.app.view-table .table-panel{
  width:100%;
  border-right:none;
}

/* EMPTY STATE */
.empty-state{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:40px 20px;
  color:var(--t3);
}
.empty-state i{font-size:24px;opacity:.4}
.empty-state p{font-size:11px}

/* TOOLTIP */
.leaflet-tooltip{
  font-family:var(--f-u);
  font-size:10px;
  font-weight:600;

<script>
/* ═══════════════════════════════════════════════════════════════════
   LCG PSEUDO-RANDOM (seed=7) — deterministic data generation
════════════════════════════════════════════════════════════════════ */
function makeLCG(seed){
  let s = seed;
  return function(){
    s = (1664525 * s + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0x100000000;
  };
}
const rng = makeLCG(7);
function ri(min,max){return Math.floor(rng()*(max-min+1))+min;}
function rf(min,max,dec=1){return parseFloat((rng()*(max-min)+min).toFixed(dec));}
function pick(arr){return arr[Math.floor(rng()*arr.length)];}

/* ═══════════════════════════════════════════════════════════════════
   DATA GENERATION
════════════════════════════════════════════════════════════════════ */
const MODELS = ['Volvo FH 500','Scania R450','Mercedes Actros','DAF XF 530','Iveco Tector','Volkswagen Constellation','Ford Cargo 2429'];
const BRANDS = {'Volvo FH 500':'Volvo','Scania R450':'Scania','Mercedes Actros':'Mercedes-Benz','DAF XF 530':'DAF','Iveco Tector':'Iveco','Volkswagen Constellation':'Volkswagen','Ford Cargo 2429':'Ford'};
const DRIVERS = ['João Silva','Marcos Souza','Ricardo Almeida','Carlos Pereira','Paulo Santos','André Lima','Fernando Costa','Roberto Oliveira','Luís Ferreira','Antônio Rodrigues','José Neves','Eduardo Machado'];
const GROUPS = ['GLP','GLP','GLP','GLP','GLP','GLP','GLP','GLP','GLP','GLP','GLP','GLP','Máquinas','Máquinas','Máquinas','Máquinas','Máquinas','Máquinas','Máquinas','Máquinas','Combustível','Combustível','Combustível','Combustível','Combustível','Combustível','Combustível','Químico','Químico','Químico','Químico','Químico'];
const CLIENTS = ['BOMBRIL','KELLUX','FENZA','AMBEV','PETROBRAS','VALE','EMBRAER','RAÍZEN','ITAMBÉ','NATURA'];
const ADDRESSES = [
  'Av. Paulista, 1374 — São Paulo, SP',
  'Rod. Presidente Dutra km 22 — Guarulhos, SP',
  'Av. Brasil, 4800 — Rio de Janeiro, RJ',
  'BR-116 km 340 — Curitiba, PR',
  'Av. das Indústrias, 2300 — Belo Horizonte, MG',
  'Rod. Anhanguera km 55 — Campinas, SP',
  'Av. Domingos Ferreira, 900 — Recife, PE',
  'Rod. BR-060 km 15 — Goiânia, GO',
  'Av. Doutora Nadir Aguiar, 500 — Salvador, BA',
  'Rua Prudente de Morais, 100 — Fortaleza, CE',
  'Rod. Castelo Branco km 32 — Sorocaba, SP',
  'Av. Engenheiro Luís Carlos Berrini, 500 — São Paulo, SP',
];
const ORIGINS = ['Terminal SP-Norte','CD Guarulhos','Porto de Santos','CD Contagem','Terminal Curitiba','CD Ribeirão Preto'];
const DESTS = ['CD Fortaleza','Terminal Rio Sul','CD Belo Horizonte','Porto Alegre Sul','CD Recife','Terminal Campinas'];
const CARGOS = ['Fertilizantes A-Grade','Produtos Químicos Grau I','Componentes Eletrônicos','Matéria Prima GLP','Máquinas Pesadas','Combustível Grau B','Alimentos Secos'];
const MANUT_REASONS = ['Troca de pneus e alinhamento','Revisão de 30.000 km','Manutenção preventiva motor','Troca de freios e pastilhas','Revisão elétrica completa','Troca de óleo e filtros'];
const UPDATES = ['1min atrás','2min atrás','3min atrás','5min atrás','8min atrás','12min atrás','18min atrás','24min atrás'];

// Brazilian lat/lng roughly distributed across country
const COORDS = [
  [-23.55, -46.63], [-22.91, -43.17], [-19.92, -43.94], [-25.43, -49.27],
  [-15.78, -47.93], [-12.97, -38.50], [-3.72, -38.54], [-8.05, -34.88],
  [-30.03, -51.22], [-16.72, -49.30], [-1.46, -48.50], [-20.32, -40.34],
  [-21.76, -43.35], [-2.53, -44.30], [-9.97, -67.81], [-27.60, -48.55],
  [-23.18, -45.88], [-22.37, -41.78], [-18.91, -48.28], [-10.93, -37.07],
  [-28.26, -52.42], [-13.02, -38.51], [-7.13, -34.87], [-3.10, -60.02],
  [-26.82, -49.32], [-24.31, -47.00], [-23.97, -46.32], [-22.71, -47.65],
  [-23.00, -43.36], [-15.60, -56.10], [-5.09, -42.80], [-20.45, -54.61]
];

function genPlate(){
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const l = ()=>letters[ri(0,25)];
  const d = ()=>ri(0,9);
  return `${l()}${l()}${l()}-${d()}${l()}${d()}${d()}`;
}

function genPhone(){
  return `(${ri(11,99)}) 9${ri(1000,9999)}-${ri(1000,9999)}`;
}

function genSM(isTravel){
  if(!isTravel) return null;
  const total = ri(120,950);
  const done = ri(20,total-10);
  const pct = done/total;
  const baseHour = 8 + Math.floor(pct * 10);
  const baseMins = ri(0,59);
  const etaH = Math.min(23, baseHour + ri(1,4));
  const etaM = ri(0,59);
  return {
    id: `SM-2025-${ri(1000,9999)}`,
    client: pick(CLIENTS),
    origin: pick(ORIGINS),
    destination: pick(DESTS),
    cargo: pick(CARGOS),
    distanceTotal: total,
    distanceDone: done,
    expectedArrival: `${String(etaH).padStart(2,'0')}:${String(etaM).padStart(2,'0')}`
  };
}

function genManut(){
  const days = ri(1,12);
  const endDays = days + ri(2,8);
  const today = new Date();
  const entry = new Date(today - days*86400000);
  const end = new Date(today.getTime() + endDays*86400000);
  return {
    entryDate: entry.toLocaleDateString('pt-BR'),
    estimatedEnd: end.toLocaleDateString('pt-BR'),
    reason: pick(MANUT_REASONS)
  };
}

// Status distribution: 16 traveling, 8 parked, 5 maintenance, 3 offline
const STATUS_POOL = [
  'traveling','traveling','traveling','traveling','traveling','traveling','traveling','traveling',
  'traveling','traveling','traveling','traveling','traveling','traveling','traveling','traveling',
  'parked','parked','parked','parked','parked','parked','parked','parked',
  'maintenance','maintenance','maintenance','maintenance','maintenance',
  'offline','offline','offline'
];
// subStatus for traveling: 5 transit, 4 scheduled, 4 loading, 3 unloading
const SUBSTATUS_POOL = ['transit','transit','transit','transit','transit','scheduled','scheduled','scheduled','scheduled','loading','loading','loading','loading','unloading','unloading','unloading'];

function generateVehicles(){
  const statuses = [...STATUS_POOL];
  const subStatuses = [...SUBSTATUS_POOL];
  const vehicles = [];

  for(let i=0;i<32;i++){
    const status = statuses[i];
    const model = pick(MODELS);
    const isTraveling = status === 'traveling';
    const isMaint = status === 'maintenance';
    const isOffline = status === 'offline';
    const subStatus = isTraveling ? subStatuses.shift() : null;
    const coords = COORDS[i % COORDS.length];
    const fuelPct = isMaint ? ri(5,30) : isOffline ? ri(10,40) : ri(20,95);
    const hasTemp = (GROUPS[i] === 'Químico' || GROUPS[i] === 'GLP') && rng() > 0.5;

    vehicles.push({
      id: `V${String(i+1).padStart(3,'0')}`,
      plate: genPlate(),
      model,
      brand: BRANDS[model],
      driver: DRIVERS[i % DRIVERS.length],
      driverPhone: genPhone(),
      ignition: isTraveling ? 'on' : (isMaint ? 'off' : (rng()>0.7?'on':'off')),
      speed: isTraveling ? (subStatus==='transit'?ri(55,95):subStatus==='loading'||subStatus==='unloading'?0:ri(0,10)) : 0,
      status,
      subStatus,
      lat: coords[0] + (rng()-0.5)*0.5,
      lng: coords[1] + (rng()-0.5)*0.5,
      lastUpdate: isOffline ? `${ri(30,120)}min atrás` : pick(UPDATES),
      odometer: ri(12000,380000),
      fuel: fuelPct,
      temperature: hasTemp ? rf(-2, 12, 1) : null,
      group: GROUPS[i],
      address: pick(ADDRESSES),
      sm: genSM(isTraveling),
      maintenanceInfo: isMaint ? genManut() : null
    });
  }
  return vehicles;
}

const VEHICLES = generateVehicles();

/* ═══════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════════ */
const state = {
  search: '',
  groupFilter: '',
  statusFilter: 'all',
  subStatusFilter: '',
  sortField: 'plate',
  sortDir: 'asc',
  selectedId: null,
  viewMode: 'split'
};

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════════════════ */
const STATUS_COLOR = {
  traveling: 'var(--green)',
  parked: 'var(--blue)',
  maintenance: 'var(--orange)',
  offline: 'var(--t4)'
};
const STATUS_LABEL = {
  traveling: 'Em Viagem',
  parked: 'Disponível',
  maintenance: 'Manutenção',
  offline: 'Offline'
};
const STATUS_BADGE_CLASS = {
  traveling: 'chip chip-green',
  parked: 'chip chip-blue',
  maintenance: 'chip chip-orange',
  offline: 'chip chip-gray'
};
const SUBSTATUS_LABEL = {
  scheduled: 'Programada',
  loading: 'Carregando',
  transit: 'Em Trânsito',
  unloading: 'Descarregando'
};

function fuelColor(pct){
  if(pct < 20) return 'var(--red)';
  if(pct < 50) return 'var(--amber)';
  return 'var(--green)';
}

function progressColor(pct){
  if(pct < 0.2) return 'var(--red)';
  if(pct < 0.5) return 'var(--amber)';
  return 'var(--green)';
}

function getFiltered(){
  let list = VEHICLES.slice();

  if(state.search){
    const q = state.search.toLowerCase();
    list = list.filter(v=>
      v.plate.toLowerCase().includes(q) ||
      v.driver.toLowerCase().includes(q) ||
      v.model.toLowerCase().includes(q)
    );
  }

  if(state.groupFilter){
    list = list.filter(v=>v.group === state.groupFilter);
  }

  if(state.statusFilter !== 'all'){
    list = list.filter(v=>v.status === state.statusFilter);
  }

  if(state.subStatusFilter && state.statusFilter === 'traveling'){
    list = list.filter(v=>v.subStatus === state.subStatusFilter);
  }

  // Sort
  list.sort((a,b)=>{
    let av = a[state.sortField], bv = b[state.sortField];
    if(typeof av === 'string') av = av.toLowerCase();
    if(typeof bv === 'string') bv = bv.toLowerCase();
    if(av < bv) return state.sortDir === 'asc' ? -1 : 1;
    if(av > bv) return state.sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  return list;
}

/* ═══════════════════════════════════════════════════════════════════
   KPI COUNTS
════════════════════════════════════════════════════════════════════ */
function updateKPI(){
  const total = VEHICLES.length;
  const traveling = VEHICLES.filter(v=>v.status==='traveling').length;
  const parked = VEHICLES.filter(v=>v.status==='parked').length;
  const manut = VEHICLES.filter(v=>v.status==='maintenance').length;
  const offline = VEHICLES.filter(v=>v.status==='offline').length;

  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-traveling').textContent = traveling;
  document.getElementById('kpi-parked').textContent = parked;
  document.getElementById('kpi-manut').textContent = manut;
  document.getElementById('kpi-offline').textContent = offline;

  const legT = document.getElementById('leg-traveling');
  const legP = document.getElementById('leg-parked');
  const legM = document.getElementById('leg-manut');
  const legO = document.getElementById('leg-offline');
  if(legT) legT.textContent = traveling + ' ';
  if(legP) legP.textContent = parked + ' ';
  if(legM) legM.textContent = manut + ' ';
  if(legO) legO.textContent = offline + ' ';
}

/* ═══════════════════════════════════════════════════════════════════
   TABLE RENDER
════════════════════════════════════════════════════════════════════ */
function renderTable(){
  const body = document.getElementById('table-body');
  const list = getFiltered();

  if(list.length === 0){
    const filterLabel = {all:'',traveling:' em viagem',parked:' disponível',maintenance:' em manutenção',offline:' offline'}[state.statusFilter]||'';
    const groupLabel = state.groupFilter ? ` no grupo ${state.groupFilter}` : '';
    body.innerHTML = `<div class="empty-state"><i class="fa-solid fa-truck-fast"></i><p>Nenhum veículo${filterLabel}${groupLabel}</p><p style="font-size:10px;margin-top:4px;opacity:.7">Ajuste os filtros para ver mais veículos</p></div>`;
    return;
  }

  const DOT_CLASS = {traveling:'fs-em_rota',parked:'fs-disponivel',maintenance:'fs-manutencao',offline:'fs-offline'};
  const STATUS_SLBL = {traveling:'Em Viagem',parked:'Disponível',maintenance:'Manutenção',offline:'Sem Sinal'};
  const SLBL_CLS = {traveling:'slbl slbl-green',parked:'slbl slbl-blue',maintenance:'slbl slbl-amber',offline:'slbl slbl-gray'};

  body.innerHTML = list.map(v=>{
    const fColor = fuelColor(v.fuel);
    const isSelected = v.id === state.selectedId;
    const dotCls = DOT_CLASS[v.status] || 'fs-offline';

    return `
    <div class="vrow${isSelected?' selected':''}" onclick="selectVehicle('${v.id}')">
      <div class="vr-status">
        <div class="rc-dot ${dotCls}"></div>
      </div>
      <div class="vr-vehicle">
        <div class="vr-plate">${v.plate}</div>
        <div class="vr-model">${v.model}</div>
      </div>
      <div class="vr-driver">
        <div class="vr-dname">${v.driver.split(' ').slice(0,2).join(' ')}</div>
      </div>
      <div class="vr-statuslbl">
        <span class="${SLBL_CLS[v.status]||'slbl slbl-gray'}">${STATUS_SLBL[v.status]||'—'}</span>
      </div>
      <div class="vr-fuel">
        <div class="fuel-bar-wrap">
          <div class="fuel-bar">
            <div class="fuel-fill" style="width:${v.fuel}%;background:${fColor}"></div>
          </div>
          <span class="fuel-val" style="color:${fColor}">${v.fuel}%</span>
        </div>
      </div>
      <div class="vr-updated">${v.lastUpdate}</div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════════
   MAP
════════════════════════════════════════════════════════════════════ */
let map = null;
let markers = {};

function initMap(){
  map = L.map('fleet-map', {
    center: [-15, -50],
    zoom: 5,
    zoomControl: true,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  L.control.attribution({position:'bottomright'}).addAttribution('&copy; <a href="https://carto.com">CARTO</a>').addTo(map);

  renderMarkers();
}

function markerColor(status){
  if(status==='traveling') return '#16a34a';
  if(status==='parked') return '#2563eb';
  if(status==='maintenance') return '#ea580c';
  return '#9CA3AF';
}

function renderMarkers(){
  if(!map) return;
  const list = getFiltered();
  const visibleIds = new Set(list.map(v=>v.id));

  // Remove markers not in filtered list
  Object.keys(markers).forEach(id=>{
    if(!visibleIds.has(id)){
      markers[id].remove();
      delete markers[id];
    }
  });

  list.forEach(v=>{
    const color = markerColor(v.status);
    const isSelected = v.id === state.selectedId;
    const radius = isSelected ? 11 : 8;
    const weight = isSelected ? 3 : 2;

    if(markers[v.id]){
      const m = markers[v.id];
      m.setLatLng([v.lat, v.lng]);
      m.setStyle({
        fillColor: color,
        color: isSelected ? '#fff' : '#fff',
        weight,
        radius
      });
    } else {
      const circle = L.circleMarker([v.lat, v.lng], {
        radius,
        fillColor: color,
        fillOpacity: 1,
        color: '#fff',
        weight
      });

      const subLabel = v.subStatus ? ` · ${SUBSTATUS_LABEL[v.subStatus]}` : '';
      circle.bindTooltip(
        `<strong>${v.plate}</strong><br>${v.driver}<br>${STATUS_LABEL[v.status]}${subLabel}`,
        {permanent:false, direction:'top', offset:[0,-8]}
      );
      circle.on('click', ()=>selectVehicle(v.id));
      circle.addTo(map);
      markers[v.id] = circle;
    }
  });
}

function flyToVehicle(v){
  if(!map) return;
  map.flyTo([v.lat, v.lng], 12, {duration:1.2, easeLinearity:0.25});
}

/* ═══════════════════════════════════════════════════════════════════
   DETAIL PANEL
════════════════════════════════════════════════════════════════════ */
function renderPanel(v){
  document.getElementById('dp-plate').textContent = v.plate;
  document.getElementById('dp-model').textContent = `${v.brand} · ${v.model}`;

  const badge = document.getElementById('dp-status-badge');
  const subLabel = v.subStatus ? ` · ${SUBSTATUS_LABEL[v.subStatus]}` : '';
  badge.innerHTML = `<span class="${STATUS_BADGE_CLASS[v.status]}">${STATUS_LABEL[v.status]}${subLabel}</span>`;

  // Quick actions bar
  const actionsEl = document.getElementById('dp-actions');
  actionsEl.innerHTML = `
    <button class="dp-action-btn primary" onclick="alert('Ligando para ${v.driver}...')">
      <i class="fa-solid fa-phone"></i> Ligar
    </button>
    <button class="dp-action-btn" onclick="alert('WhatsApp: ${v.driverPhone}')">
      <i class="fa-brands fa-whatsapp"></i> WhatsApp
    </button>
    <button class="dp-action-btn" onclick="flyToVehicle(VEHICLES.find(x=>x.id==='${v.id}'))">
      <i class="fa-solid fa-location-dot"></i> Localizar
    </button>`;

  const scroll = document.getElementById('dp-scroll');
  const fColor = fuelColor(v.fuel);
  const ignChip = v.ignition==='on'
    ? `<span class="chip chip-green"><i class="fa-solid fa-key" style="font-size:8px"></i> Ligado</span>`
    : `<span class="chip chip-gray"><i class="fa-solid fa-key" style="font-size:8px"></i> Desligado</span>`;
  const tempHtml = v.temperature !== null ? `
    <div class="dp-row">
      <span class="dp-label">Temperatura</span>
      <span class="${v.temperature > 8 ? 'chip chip-red' : 'chip chip-blue'}">
        <i class="fa-solid fa-temperature-half" style="font-size:9px"></i>
        ${v.temperature.toFixed(1)}°C
      </span>
    </div>` : '';

  const smHtml = v.sm ? (()=>{
    const sm = v.sm;
    const pct = sm.distanceDone / sm.distanceTotal;
    const pColor = progressColor(pct);
    return `
    <div class="dp-section">
      <div class="dp-section-title">Serviço de Manifesto</div>
      <div class="sm-card">
        <div class="sm-id">${sm.id}</div>
        <div class="sm-client">${sm.client}</div>
        <div class="sm-cargo"><i class="fa-solid fa-box" style="color:var(--t4);font-size:9px;margin-right:4px"></i>${sm.cargo}</div>
        <div class="sm-route">
          <span class="origin">${sm.origin}</span>
          <i class="fa-solid fa-arrow-right"></i>
          <span class="dest">${sm.destination}</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill" style="width:${(pct*100).toFixed(1)}%;background:${pColor}"></div>
          </div>
          <div class="progress-labels">
            <span>${sm.distanceDone} km percorridos</span>
            <span class="pct">${(pct*100).toFixed(0)}% · ${sm.distanceTotal} km</span>
          </div>
        </div>
        <div class="sm-eta">
          <span class="sm-eta-label">Previsão de chegada</span>
          <span class="sm-eta-val">${sm.expectedArrival}</span>
        </div>
      </div>
    </div>`;
  })() : '';

  const manutHtml = v.maintenanceInfo ? `
    <div class="dp-section">
      <div class="dp-section-title">Manutenção</div>
      <div class="manut-card">
        <div class="manut-title">
          <i class="fa-solid fa-wrench"></i>
          Em Manutenção
        </div>
        <div class="manut-row">
          <span class="mkey">Entrada</span>
          <span class="mval">${v.maintenanceInfo.entryDate}</span>
        </div>
        <div class="manut-row">
          <span class="mkey">Previsão de Saída</span>
          <span class="mval">${v.maintenanceInfo.estimatedEnd}</span>
        </div>
        <div class="manut-row">
          <span class="mkey">Motivo</span>
          <span class="mval" style="text-align:right;max-width:160px">${v.maintenanceInfo.reason}</span>
        </div>
      </div>
    </div>` : '';

  scroll.innerHTML = `
    ${v.status==='offline' ? `
    <div class="offline-card">
      <div class="offline-card-icon"><i class="fa-solid fa-signal-slash"></i></div>
      <div class="offline-card-body">
        <div class="offline-card-title">Veículo sem sinal</div>
        <div class="offline-card-sub">Última comunicação ${v.lastUpdate}. Verifique o rastreador ou entre em contato com o motorista.</div>
      </div>
    </div>` : ''}
    <!-- DRIVER -->
    <div class="dp-section">
      <div class="dp-section-title">Motorista</div>
      <div class="dp-row">
        <span class="dp-label">Nome</span>
        <span class="dp-value strong">${v.driver}</span>
      </div>
      <div class="dp-row">
        <span class="dp-label">Telefone</span>
        <span class="chip chip-blue" style="font-size:10px">
          <i class="fa-solid fa-phone" style="font-size:8px"></i>
          ${v.driverPhone}
        </span>
      </div>
      <div class="dp-row">
        <span class="dp-label">Ignição</span>
        ${ignChip}
      </div>
      ${v.status==='traveling' ? `
      <div class="dp-row">
        <span class="dp-label">Velocidade</span>
        <span class="dp-value mono" style="color:${v.speed>80?'var(--red)':v.speed>0?'var(--t1)':'var(--t3)'}">
          ${v.speed > 0 ? v.speed + ' km/h' : '—'}
        </span>
      </div>` : ''}
      <div class="dp-row">
        <span class="dp-label">Grupo</span>
        <span class="chip chip-gray">${v.group}</span>
      </div>
    </div>

    <!-- POSITION -->
    <div class="dp-section">
      <div class="dp-section-title">Posição</div>
      <div class="dp-row">
        <span class="dp-label">Endereço</span>
        <span class="dp-value" style="font-size:10px;line-height:1.4">${v.address}</span>
      </div>
      <div class="dp-row">
        <span class="dp-label">Última atualiz.</span>
        <span class="dp-value">${v.lastUpdate}</span>
      </div>
      <div class="dp-row">
        <span class="dp-label">Coordenadas</span>
        <span class="dp-value mono" style="font-size:10px">${v.lat.toFixed(4)}, ${v.lng.toFixed(4)}</span>
      </div>
    </div>

    <!-- FUEL + ODOMETER -->
    <div class="dp-section">
      <div class="dp-section-title">Combustível & Odômetro</div>
      <div class="fuel-big">
        <div class="fuel-big-bar">
          <div class="fuel-big-fill" style="width:${v.fuel}%;background:${fColor}"></div>
        </div>
        <div class="fuel-big-labels">
          <span class="fuel-big-val" style="color:${fColor}">${v.fuel}%</span>
          <span class="fuel-big-odo"><i class="fa-solid fa-gauge-simple" style="margin-right:4px"></i>${v.odometer.toLocaleString('pt-BR')} km</span>
        </div>
      </div>
      ${tempHtml}
    </div>

    <!-- SM (if traveling) -->
    ${smHtml}

    <!-- MAINTENANCE ALERT -->
    ${manutHtml}
  `;
}

/* ═══════════════════════════════════════════════════════════════════
   SELECT VEHICLE
════════════════════════════════════════════════════════════════════ */
function selectVehicle(id){
  state.selectedId = id;
  const v = VEHICLES.find(x=>x.id===id);
  if(!v) return;

  renderTable();
  renderMarkers();
  renderPanel(v);

  document.getElementById('detail-panel').classList.add('open');

  if(map && (state.viewMode==='split'||state.viewMode==='map')){
    flyToVehicle(v);
  }
}

function closePanel(){
  state.selectedId = null;
  document.getElementById('detail-panel').classList.remove('open');
  renderTable();
  renderMarkers();
}

/* ═══════════════════════════════════════════════════════════════════
   FILTERS & SORT
════════════════════════════════════════════════════════════════════ */
function handleSearch(val){
  state.search = val;
  render();
}

function handleGroupChange(val){
  state.groupFilter = val;
  render();
}

function setStatusFilter(f){
  if(state.statusFilter === f){
    state.statusFilter = 'all';
  } else {
    state.statusFilter = f;
  }
  state.subStatusFilter = '';

  // Show/hide substatus chips
  const chips = document.getElementById('substatus-chips');
  chips.style.display = (state.statusFilter==='traveling') ? 'flex' : 'none';

  // Update KPI active state via aria-pressed (padrão Operacional)
  document.querySelectorAll('.kpi[data-filter]').forEach(el=>{
    el.setAttribute('aria-pressed', el.dataset.filter === state.statusFilter ? 'true' : 'false');
  });

  // Clear substatus chips
  document.querySelectorAll('.ss-chip').forEach(el=>el.classList.remove('active'));

  render();
}

function setSubStatusFilter(ss){
  state.subStatusFilter = (state.subStatusFilter===ss) ? '' : ss;
  document.querySelectorAll('.ss-chip').forEach(el=>{
    el.classList.toggle('active', el.dataset.ss===state.subStatusFilter);
  });
  render();
}

function handleSort(field){
  if(state.sortField===field){
    state.sortDir = state.sortDir==='asc' ? 'desc' : 'asc';
  } else {
    state.sortField = field;
    state.sortDir = 'asc';
  }

  // Update sort icons
  ['plate','driver','fuel','lastUpdate'].forEach(f=>{
    const el = document.getElementById(`sort-${f}`);
    if(!el) return;
    el.className = 'fa-solid ' + (
      state.sortField===f
        ? (state.sortDir==='asc'?'fa-sort-up':'fa-sort-down')
        : 'fa-sort'
    );
    el.parentElement.classList.toggle('sorted', state.sortField===f);
  });

  renderTable();
}

/* ═══════════════════════════════════════════════════════════════════
   VIEW MODE
════════════════════════════════════════════════════════════════════ */
function setViewMode(mode){
  state.viewMode = mode;
  const app = document.getElementById('app');
  app.classList.remove('view-split','view-table','view-map');
  app.classList.add(`view-${mode}`);

  document.getElementById('vt-split').classList.toggle('active', mode==='split');
  document.getElementById('vt-table').classList.toggle('active', mode==='table');
  document.getElementById('vt-map').classList.toggle('active', mode==='map');

  if(map){
    setTimeout(()=>map.invalidateSize(), 280);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   REFRESH
════════════════════════════════════════════════════════════════════ */
function handleRefresh(){
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  setTimeout(()=>{
    btn.classList.remove('spinning');
    // In a real app: re-fetch data here
  }, 900);
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN RENDER
════════════════════════════════════════════════════════════════════ */
function render(){
  renderTable();
  renderMarkers();
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', ()=>{
  updateKPI();
  renderTable();
  initMap();

  // Keyboard shortcut: Escape closes panel
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape' && state.selectedId) closePanel();
  });
});
</script>
