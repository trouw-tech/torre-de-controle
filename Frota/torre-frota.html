<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Frota · Torre de Controle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  /* ══ PRIMITIVOS ══════════════════════════════════════════════════ */
  --neutral-0:#ffffff;--neutral-50:#f8f9fb;--neutral-100:#f1f3f7;
  --neutral-200:#e8ecf2;--neutral-300:#dde2ea;--neutral-400:#c4ccd8;
  --neutral-500:#9aa3b0;--neutral-600:#6b7585;--neutral-700:#4d5666;
  --neutral-800:#353e4e;--neutral-900:#222a38;--neutral-950:#141924;
  --success-50:#f0fdf4;--success-500:#16a34a;
  --warning-50:#fffbeb;--warning-500:#d97706;
  --danger-50:#fff5f5;--danger-500:#dc2626;
  --info-50:#eff6ff;--info-500:#2563eb;--info-700:#1d4ed8;

  /* ══ ALIASES SEMÂNTICOS ══════════════════════════════════════════ */
  --bg:#EEF1F8;
  --s1:var(--neutral-0);--s2:var(--neutral-50);--s3:var(--neutral-100);
  --canvas:var(--neutral-50);
  --sidebar-bg:#EAECF0;
  --border:var(--neutral-200);--b2:var(--neutral-300);--b3:var(--neutral-400);
  --t1:var(--neutral-900);--t2:var(--neutral-700);--t3:var(--neutral-500);--t4:var(--neutral-400);
  --blue:var(--info-500);    --blue-s:rgba(37,99,235,.10);--blue-m:rgba(37,99,235,.20);
  --red:var(--danger-500);   --red-s:rgba(220,38,38,.09);
  --amber:var(--warning-500);--amber-s:rgba(217,119,6,.10);
  --green:var(--success-500);--green-s:rgba(22,163,74,.10);
  --orange:#ea580c;          --orange-s:rgba(234,88,12,.10);
  --f-u:'Plus Jakarta Sans',sans-serif;
  --f-d:'Plus Jakarta Sans',sans-serif;
  --f-m:'Plus Jakarta Sans',sans-serif;
  --sidebar-w:56px;
  --panel-w:320px;
  --radius-sm:4px;--radius-md:6px;--radius-base:8px;--radius-lg:10px;--radius-xl:14px;--radius-full:9999px;
  --elev-1:0 1px 2px rgba(20,25,36,.05);
  --elev-2:0 1px 3px rgba(20,25,36,.07),0 2px 8px rgba(20,25,36,.05);
  --elev-3:0 4px 12px rgba(20,25,36,.10),0 2px 4px rgba(20,25,36,.06);
  --text-xs:9px;--text-sm:10px;--text-base:11px;--text-md:12px;--text-lg:14px;
}

/* tabular-nums em qualquer coisa que mostre dados numéricos */
.vr-plate,.dp-plate,.fuel-val,.vr-updated,.ova-value,.kpi-val,.speed-chip,
.sm-eta-val,.sm-id,.progress-labels,.fuel-big-val{
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum" 1;
}

html,body{height:100%;font-family:var(--f-u);background:var(--bg);color:var(--t1);
  font-size:11px;overflow:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:var(--f-u);cursor:pointer;border:none;background:none}

/* ══ SIDEBAR ══════════════════════════════════════════════════════ */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--sidebar-bg);border-right:1px solid var(--border);
  box-shadow:2px 0 8px rgba(0,0,0,.06);
  display:flex;flex-direction:column;
  padding:10px 0;z-index:100;overflow:hidden;
  transition:width .22s cubic-bezier(.4,0,.2,1);
}
.sidebar.expanded{width:200px}

.sidebar-logo{
  display:flex;align-items:center;gap:10px;
  padding:4px 11px 14px;flex-shrink:0;
}
.logo-mark{
  width:34px;height:34px;flex-shrink:0;
  background:var(--blue);border-radius:var(--radius-base);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:800;letter-spacing:.5px;
}
.logo-text{
  font-family:var(--f-d);font-weight:700;font-size:14px;letter-spacing:.05em;
  text-transform:uppercase;color:var(--t2);white-space:nowrap;overflow:hidden;
  opacity:0;width:0;transition:opacity .15s,width .22s;
}
.sidebar.expanded .logo-text{opacity:1;width:auto}

.nav-section-label{
  font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t4);padding:8px 11px 4px;white-space:nowrap;overflow:hidden;
  opacity:0;height:0;transition:opacity .15s,height .15s;
}
.sidebar.expanded .nav-section-label{opacity:1;height:auto}

.nav-sep{width:32px;height:1px;background:var(--border);margin:6px 12px;flex-shrink:0}
.sidebar.expanded .nav-sep{width:calc(100% - 24px)}

.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:0 8px;margin:0 4px;height:38px;border-radius:var(--radius-lg);
  cursor:pointer;color:var(--t3);transition:all .15s;position:relative;overflow:hidden;
  flex-shrink:0;
}
.nav-item:hover{background:var(--s2);color:var(--t2)}
.nav-item.active{background:var(--blue-s);color:var(--blue)}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;width:2px;
  border-radius:0 2px 2px 0;background:var(--blue);
}
.nav-item-icon{font-size:15px;flex-shrink:0;width:24px;text-align:center}
.nav-item-label{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;
  opacity:0;transition:opacity .12s}
.sidebar.expanded .nav-item-label{opacity:1}
.nav-badge{
  position:absolute;top:7px;left:24px;
  width:7px;height:7px;border-radius:50%;background:var(--red);
  border:1.5px solid var(--sidebar-bg);
}
.sidebar.expanded .nav-badge{left:auto;right:10px;top:50%;transform:translateY(-50%)}
.nav-bottom{margin-top:auto}

/* ══ APP LAYOUT ═══════════════════════════════════════════════════ */
.app{display:flex;height:100vh;overflow:hidden}
.main-wrap{display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden}

/* ══ TOPBAR 86px ══════════════════════════════════════════════════ */
.topbar{
  height:86px;flex-shrink:0;
  background:var(--canvas);
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 6px rgba(15,23,42,.04);
  display:flex;align-items:stretch;
  z-index:20;position:relative;
}

/* ── Frota Summary (slot esquerdo, alinhado acima da table panel) ─ */
.frota-summary{
  width:var(--panel-w);flex-shrink:0;
  border-right:1px solid var(--border);
  display:flex;align-items:stretch;
}
.frota-summary .fs-row{
  flex:1;display:flex;align-items:stretch;gap:0;height:100%;
}
.frota-summary .ova-card{
  flex:1;display:flex;flex-direction:column;justify-content:flex-start;
  padding:10px 14px 8px;cursor:pointer;transition:background .12s;gap:4px;
  min-width:0;
}
.frota-summary .ova-card+.ova-card{box-shadow:inset 1px 0 0 var(--border)}
.frota-summary .ova-card:hover{background:var(--s3)}
.frota-summary .ova-label{
  font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--t3);line-height:1;opacity:.75;
}
.frota-summary .ova-line{display:flex;align-items:baseline;gap:3px;line-height:1}
.frota-summary .ova-value{
  font-family:var(--f-d);font-weight:800;font-size:20px;line-height:1;color:var(--t1);
}
.frota-summary .ova-suffix{font-size:9px;font-weight:600;color:var(--t3)}
.frota-summary .ova-delta{
  font-family:var(--f-d);font-weight:700;font-size:9px;line-height:1;margin-left:auto;
}
.frota-summary .ova-delta.up{color:var(--red)}
.frota-summary .ova-delta.dn{color:var(--green)}
.frota-summary .ova-mini{
  font-size:9px;font-weight:600;color:var(--t3);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.frota-summary .ova-mini b{color:var(--t2);font-weight:700}
/* barra empilhada de saúde */
.frota-summary .ova-stacked{
  display:flex;height:4px;border-radius:2px;overflow:hidden;
  width:100%;background:var(--s3);margin-top:2px;
}
.frota-summary .ova-stacked span{display:block;height:100%;transition:width .4s ease}
.frota-summary .seg-ok{background:var(--green)}
.frota-summary .seg-warn{background:var(--amber)}
.frota-summary .seg-crit{background:var(--red)}
/* reatividade de cor */
.frota-summary .health-good .ova-value{color:var(--green)}
.frota-summary .health-warn .ova-value{color:var(--amber)}
.frota-summary .health-bad  .ova-value{color:var(--red)}
.frota-summary .alert-none .ova-value{color:var(--t3)}
.frota-summary .alert-some .ova-value{color:var(--amber)}
.frota-summary .alert-many .ova-value{color:var(--red);text-shadow:0 0 12px rgba(220,38,38,.35)}

/* ── KPI Strip (centro) ──────────────────────────────────────────── */
.kpi-strips-wrap{
  flex:1;min-width:0;
  display:flex;align-items:stretch;overflow:hidden;
}
.kpi-strip{
  flex:1;display:flex;align-items:stretch;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;
}
.kpi-strip::-webkit-scrollbar{height:4px}
.kpi-strip::-webkit-scrollbar-track{background:transparent}
.kpi-strip::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.kpi-group{
  display:flex;flex-direction:column;justify-content:flex-start;
  padding:10px 8px 8px 14px;
}
.kpi-group-label{
  font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--t3);margin-bottom:6px;padding-left:2px;opacity:.75;line-height:1;
}
.kpi-group-items{display:flex;align-items:stretch;gap:6px}

.kpi{
  appearance:none;font:inherit;color:inherit;text-align:left;
  display:flex;flex-direction:column;justify-content:center;
  padding:6px 14px 7px;min-width:90px;
  background:var(--s1);border:1px solid var(--b2);border-radius:var(--radius-md);
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 1px 0 rgba(15,23,42,.03),0 2px 4px rgba(15,23,42,.05);
  transition:background .15s,border-color .15s,transform .12s,box-shadow .15s;
}
.kpi:hover{
  border-color:var(--b3);transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(15,23,42,.10),0 2px 4px rgba(15,23,42,.06);
}
.kpi:active{transform:translateY(0)}
.kpi[aria-pressed="true"]{
  border-color:var(--blue) !important;
  box-shadow:0 0 0 2px rgba(37,99,235,.15),0 2px 4px rgba(15,23,42,.05) !important;
}
/* accent bar esquerda */
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;opacity:0;transition:opacity .15s}
.kpi-val{font-family:var(--f-d);font-weight:900;font-size:20px;line-height:1;letter-spacing:-.01em}
.kpi-lbl{font-size:9px;font-weight:500;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin-top:3px;white-space:nowrap}
/* estados semânticos com gradiente + glow */
.kpi.ok .kpi-val{color:var(--green)}
.kpi.ok{background:linear-gradient(180deg,#fff 0%,#f3fbf5 100%);border-color:rgba(22,163,74,.22)}
.kpi.ok::before{opacity:1;background:var(--green)}
.kpi.warn .kpi-val{color:var(--amber)}
.kpi.warn{background:linear-gradient(180deg,#fff 0%,#fffbf1 100%);border-color:rgba(217,119,6,.22)}
.kpi.warn::before{opacity:1;background:var(--amber)}
.kpi.danger .kpi-val{color:var(--red);text-shadow:0 0 14px rgba(220,38,38,.4)}
.kpi.danger{background:linear-gradient(180deg,#fff 0%,#fff5f6 100%);border-color:rgba(220,38,38,.22)}
.kpi.danger::before{opacity:1;background:var(--red)}
.kpi.neutral .kpi-val{color:var(--t1)}

/* ── Topbar Actions (direita) ────────────────────────────────────── */
.topbar-actions{
  display:flex;align-items:center;gap:10px;
  padding:0 16px;flex-shrink:0;border-left:1px solid var(--border);
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0;
  animation:lp 2.2s ease-in-out infinite;
}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 8px var(--green)}50%{opacity:.4;box-shadow:0 0 3px var(--green)}}
.live-label{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.04em}
.btn-refresh{
  display:flex;align-items:center;gap:6px;
  padding:0 12px;height:30px;border-radius:var(--radius-md);
  font-size:11px;font-weight:600;
  background:var(--s2);border:1px solid var(--border);color:var(--t2);
  transition:all .15s;
}
.btn-refresh:hover{background:var(--s1);border-color:var(--b2);color:var(--t1)}
.btn-refresh.spinning i{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ TOOLBAR ══════════════════════════════════════════════════════ */
.toolbar{
  height:40px;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap i{position:absolute;left:9px;color:var(--t3);font-size:11px;pointer-events:none}
.search-input{
  height:28px;padding:0 10px 0 28px;
  border:1px solid var(--border);border-radius:var(--radius-md);
  font-family:var(--f-u);font-size:11px;color:var(--t1);background:var(--s2);
  width:200px;transition:all .15s;
}
.search-input::placeholder{color:var(--t3)}
.search-input:focus{outline:none;border-color:var(--blue);background:var(--s1);box-shadow:0 0 0 3px var(--blue-m)}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.select-group{
  height:28px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-md);
  font-family:var(--f-u);font-size:11px;color:var(--t1);background:var(--s2);cursor:pointer;
}
.select-group:focus{outline:none;border-color:var(--blue)}
.substatus-chips{display:flex;align-items:center;gap:5px}
.ss-chip{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:500;padding:5px 11px;border-radius:var(--radius-md);cursor:pointer;
  border:1px solid var(--border);color:var(--t2);background:transparent;
  transition:all .12s;user-select:none;
}
.ss-chip:hover{border-color:var(--b2);color:var(--t1);background:var(--s2)}
.ss-chip.active{background:var(--blue-s);border-color:var(--blue);color:var(--blue);font-weight:600}
.toolbar-spacer{flex:1}
.view-toggle{
  display:flex;align-items:center;gap:2px;
  background:var(--s3);border-radius:var(--radius-md);padding:2px;border:1px solid var(--border);
}
.vt-btn{
  width:28px;height:24px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--t3);cursor:pointer;transition:all .15s;
}
.vt-btn:hover{color:var(--t2)}
.vt-btn.active{background:var(--s1);color:var(--blue);box-shadow:var(--elev-1)}

/* ══ MAIN CONTENT ═════════════════════════════════════════════════ */
.main-content{display:flex;flex:1;overflow:hidden}

/* ── Table Panel ─────────────────────────────────────────────────── */
.table-panel{
  width:480px;flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .25s ease;
}
.table-panel.hidden{width:0;border:none;overflow:hidden}

.table-header{
  display:flex;align-items:center;
  height:32px;background:var(--s3);border-bottom:1px solid var(--border);
  padding:0 8px;flex-shrink:0;
}
.th-cell{
  display:flex;align-items:center;gap:4px;
  font-size:9px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.6px;
  cursor:pointer;user-select:none;padding:0 4px;white-space:nowrap;
}
.th-cell:hover{color:var(--t2)}
.th-cell.sorted{color:var(--blue)}
.th-cell i{font-size:8px;opacity:.7}
.th-status{width:30px;flex-shrink:0}
.th-vehicle{flex:1;min-width:120px}
.th-driver{width:106px;flex-shrink:0}
.th-statuslbl{width:96px;flex-shrink:0}
.th-fuel{width:62px;flex-shrink:0;text-align:right;justify-content:flex-end}
.th-updated{width:68px;flex-shrink:0;text-align:right;justify-content:flex-end}

.table-body{overflow-y:auto;flex:1}
.table-body::-webkit-scrollbar{width:4px}
.table-body::-webkit-scrollbar-track{background:transparent}
.table-body::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── Vehicle Row ─────────────────────────────────────────────────── */
.vrow{
  display:flex;align-items:center;
  min-height:48px;padding:6px 10px 6px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;
  border-left:3px solid transparent;position:relative;
}
/* borda lateral por status */
.vrow.status-traveling {border-left-color:var(--green)}
.vrow.status-parked    {border-left-color:var(--blue);opacity:.9}
.vrow.status-maintenance{border-left-color:var(--amber)}
.vrow.status-offline   {border-left-color:var(--t4)}
/* combustível crítico prevalece */
.vrow.fuel-critical    {border-left-color:var(--red) !important}
.vrow:hover{background:var(--s2)}
.vrow.selected{background:var(--blue-s);border-left-color:var(--blue) !important}

.vr-status{width:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding-left:4px}
/* dots com animação para em viagem */
.rc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@keyframes pulse-travel{
  0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}
  60%{box-shadow:0 0 0 5px rgba(22,163,74,0)}
}
.rc-dot.dot-traveling  {background:var(--green);animation:pulse-travel 2.2s ease-in-out infinite}
.rc-dot.dot-parked     {background:var(--blue)}
.rc-dot.dot-maintenance{background:var(--amber)}
.rc-dot.dot-offline    {background:var(--t4)}

.vr-vehicle{flex:1;min-width:0;padding:0 6px}
.vr-plate-row{display:flex;align-items:center;gap:5px}
.vr-plate{font-weight:800;font-size:11px;color:var(--t1)}
.vr-model-row{display:flex;align-items:center;gap:5px;margin-top:3px}
.vr-model{font-size:9px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}

/* speed chip — velocidade real do veículo em viagem */
.speed-chip{
  display:inline-flex;align-items:center;gap:2px;flex-shrink:0;
  font-size:8px;font-weight:700;
  padding:1px 5px;border-radius:3px;white-space:nowrap;
}
.speed-chip.moving  {color:var(--green);background:var(--green-s)}
.speed-chip.fast    {color:var(--amber);background:var(--amber-s)}
.speed-chip.stopped {color:var(--t3);background:var(--s3)}

/* temp chip — carga fria / carga controlada */
.temp-chip{
  display:inline-flex;align-items:center;gap:2px;flex-shrink:0;
  font-size:8px;font-weight:700;color:var(--blue);
  padding:1px 5px;border-radius:3px;background:var(--blue-s);white-space:nowrap;
}
.temp-chip.warn{color:var(--amber);background:var(--amber-s)}

.vr-driver{width:106px;flex-shrink:0;padding:0 4px}
.vr-dname{font-size:10px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.vr-statuslbl{width:96px;flex-shrink:0}
.slbl{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);white-space:nowrap}
.slbl-green{background:var(--green-s);color:var(--green)}
.slbl-blue {background:var(--blue-s);color:var(--blue)}
.slbl-amber{background:var(--amber-s);color:var(--amber)}
.slbl-red  {background:var(--red-s);color:var(--red)}
.slbl-gray {background:var(--s3);color:var(--t3)}

.vr-fuel{width:62px;flex-shrink:0;padding:0 4px}
.fuel-bar-wrap{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.fuel-bar{width:42px;height:4px;border-radius:2px;background:var(--s3);overflow:hidden}
.fuel-fill{height:100%;border-radius:2px;transition:width .3s}
.fuel-val{font-size:9px;min-width:30px;text-align:right}
/* glow quando combustível crítico */
.vrow.fuel-critical .fuel-val{text-shadow:0 0 6px rgba(220,38,38,.5)}

.vr-updated{width:68px;flex-shrink:0;text-align:right;font-size:9px;color:var(--t3);padding:0 4px}

/* ══ MAP PANEL ════════════════════════════════════════════════════ */

function makeLCG(seed){
  let s = seed;
  return function(){
    s = (1664525 * s + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0x100000000;
  };
}
const rng = makeLCG(7);
function ri(min,max){return Math.floor(rng()*(max-min+1))+min;}
function rf(min,max,dec=1){return parseFloat((rng()*(max-min)+min).toFixed(dec));}
function pick(arr){return arr[Math.floor(rng()*arr.length)];}

  return {id:`SM-2025-${ri(1000,9999)}`,client:pick(CLIENTS),origin:pick(ORIGINS),destination:pick(DESTS),
    cargo:pick(CARGOS),distanceTotal:total,distanceDone:done,
    expectedArrival:`${String(etaH).padStart(2,'0')}:${String(etaM).padStart(2,'0')}`};
}

function genManut(){
  const days=ri(1,12),endDays=days+ri(2,8),today=new Date();
  const entry=new Date(today-days*86400000),end=new Date(today.getTime()+endDays*86400000);
  return {entryDate:entry.toLocaleDateString('pt-BR'),estimatedEnd:end.toLocaleDateString('pt-BR'),reason:pick(MANUT_REASONS)};
}

const STATUS_POOL=[
  'traveling','traveling','traveling','traveling','traveling','traveling','traveling','traveling',
  'traveling','traveling','traveling','traveling','traveling','traveling','traveling','traveling',
  'parked','parked','parked','parked','parked','parked','parked','parked',
  'maintenance','maintenance','maintenance','maintenance','maintenance',
  'offline','offline','offline'
];
const SUBSTATUS_POOL=['transit','transit','transit','transit','transit','scheduled','scheduled','scheduled','scheduled','loading','loading','loading','loading','unloading','unloading','unloading'];

function generateVehicles(){
  const statuses=[...STATUS_POOL],subStatuses=[...SUBSTATUS_POOL],vehicles=[];
  for(let i=0;i<32;i++){
    const status=statuses[i],model=pick(MODELS);
    const isTraveling=status==='traveling',isMaint=status==='maintenance',isOffline=status==='offline';
    const subStatus=isTraveling?subStatuses.shift():null;
    const coords=COORDS[i%COORDS.length];
    const fuelPct=isMaint?ri(5,30):isOffline?ri(10,40):ri(20,95);
    const hasTemp=(GROUPS[i]==='Químico'||GROUPS[i]==='GLP')&&rng()>0.5;
    vehicles.push({
      id:`V${String(i+1).padStart(3,'0')}`,plate:genPlate(),model,brand:BRANDS[model],
      driver:DRIVERS[i%DRIVERS.length],driverPhone:genPhone(),
      ignition:isTraveling?'on':(isMaint?'off':(rng()>0.7?'on':'off')),
      speed:isTraveling?(subStatus==='transit'?ri(55,95):(subStatus==='loading'||subStatus==='unloading'?0:ri(0,10))):0,
      status,subStatus,
      lat:coords[0]+(rng()-0.5)*0.5,lng:coords[1]+(rng()-0.5)*0.5,
      lastUpdate:isOffline?`${ri(30,120)}min atrás`:pick(UPDATES),
      odometer:ri(12000,380000),fuel:fuelPct,
      temperature:hasTemp?rf(-2,12,1):null,
      group:GROUPS[i],address:pick(ADDRESSES),
      sm:genSM(isTraveling),maintenanceInfo:isMaint?genManut():null
    });
  }
  return vehicles;
}

const VEHICLES=generateVehicles();

/* ═══════════════════════════════════════════════════════════════════
   ESTADO
════════════════════════════════════════════════════════════════════ */
const state={
  search:'',groupFilter:'',statusFilter:'all',subStatusFilter:'',
  sortField:'plate',sortDir:'asc',selectedId:null,viewMode:'split'
};

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════════════════ */
const STATUS_LABEL={traveling:'Em Viagem',parked:'Disponível',maintenance:'Manutenção',offline:'Offline'};
const STATUS_BADGE_CLASS={traveling:'chip chip-green',parked:'chip chip-blue',maintenance:'chip chip-orange',offline:'chip chip-gray'};
const SUBSTATUS_LABEL={scheduled:'Programada',loading:'Carregando',transit:'Em Trânsito',unloading:'Descarregando'};

function fuelColor(pct){
  if(pct<20) return 'var(--red)';
  if(pct<50) return 'var(--amber)';
  return 'var(--green)';
}
function progressColor(pct){
  if(pct<0.2) return 'var(--red)';
  if(pct<0.5) return 'var(--amber)';
  return 'var(--green)';
}

function getFiltered(){
  let list=VEHICLES.slice();
  if(state.search){
    const q=state.search.toLowerCase();
    list=list.filter(v=>v.plate.toLowerCase().includes(q)||v.driver.toLowerCase().includes(q)||v.model.toLowerCase().includes(q));
  }
  if(state.groupFilter) list=list.filter(v=>v.group===state.groupFilter);
  if(state.statusFilter!=='all') list=list.filter(v=>v.status===state.statusFilter);
  if(state.subStatusFilter&&state.statusFilter==='traveling') list=list.filter(v=>v.subStatus===state.subStatusFilter);
  list.sort((a,b)=>{
    let av=a[state.sortField],bv=b[state.sortField];
    if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase();}
    if(av<bv) return state.sortDir==='asc'?-1:1;
    if(av>bv) return state.sortDir==='asc'?1:-1;
    return 0;
  });
  return list;
}

/* ═══════════════════════════════════════════════════════════════════
   FROTA SUMMARY — slot esquerdo do topbar
════════════════════════════════════════════════════════════════════ */
function updateFrotaSummary(){
  const total=VEHICLES.length;
  const traveling=VEHICLES.filter(v=>v.status==='traveling').length;
  const parked=VEHICLES.filter(v=>v.status==='parked').length;
  const manut=VEHICLES.filter(v=>v.status==='maintenance').length;
  const offline=VEHICLES.filter(v=>v.status==='offline').length;
  const operational=traveling+parked;
  const opPct=operational/total;

  // Saúde
  const saudeCard=document.getElementById('ova-saude');
  document.getElementById('ova-saude-val').textContent=operational;
  document.getElementById('ova-saude-suf').textContent='/'+total;
  saudeCard.className='ova-card '+(opPct>=0.85?'health-good':opPct>=0.7?'health-warn':'health-bad');
  document.getElementById('bar-ok').style.width=(traveling/total*100).toFixed(1)+'%';
  document.getElementById('bar-warn').style.width=(parked/total*100).toFixed(1)+'%';
  document.getElementById('bar-crit').style.width=((manut+offline)/total*100).toFixed(1)+'%';
  document.getElementById('ova-saude-mini').innerHTML=`<b>${traveling}</b> viajando · <b>${parked}</b> disponíveis`;

  // Alertas: combustível crítico + offline
  const fuelCrit=VEHICLES.filter(v=>v.fuel<20).length;
  const alertCount=fuelCrit+offline;
  const alertasCard=document.getElementById('ova-alertas');
  document.getElementById('ova-alertas-val').textContent=alertCount||'—';
  alertasCard.className='ova-card '+(alertCount===0?'alert-none':alertCount<=3?'alert-some':'alert-many');
  document.getElementById('ova-alertas-mini').innerHTML=alertCount>0
    ?`<b>${fuelCrit}</b> comb. crítico · <b>${offline}</b> sem sinal`
    :'Sem alertas ativos';

  // Em Campo
  const transit=VEHICLES.filter(v=>v.subStatus==='transit').length;
  document.getElementById('ova-campo-val').textContent=traveling;
  document.getElementById('ova-campo-mini').innerHTML=`<b>${transit}</b> em trânsito`;
}

/* ═══════════════════════════════════════════════════════════════════
   KPI COUNTS
════════════════════════════════════════════════════════════════════ */
function updateKPI(){
  const traveling=VEHICLES.filter(v=>v.status==='traveling').length;
  const parked=VEHICLES.filter(v=>v.status==='parked').length;
  const manut=VEHICLES.filter(v=>v.status==='maintenance').length;
  const offline=VEHICLES.filter(v=>v.status==='offline').length;
  document.getElementById('kpi-total').textContent=VEHICLES.length;
  document.getElementById('kpi-traveling').textContent=traveling;
  document.getElementById('kpi-parked').textContent=parked;
  document.getElementById('kpi-manut').textContent=manut;
  document.getElementById('kpi-offline').textContent=offline;
  const legT=document.getElementById('leg-traveling');
  const legP=document.getElementById('leg-parked');
  const legM=document.getElementById('leg-manut');
  const legO=document.getElementById('leg-offline');
  if(legT) legT.textContent=traveling+' ';
  if(legP) legP.textContent=parked+' ';
  if(legM) legM.textContent=manut+' ';

}

/* ═══════════════════════════════════════════════════════════════════
   TABLE RENDER
════════════════════════════════════════════════════════════════════ */
function renderTable(){
  const body=document.getElementById('table-body');
  const list=getFiltered();

  if(list.length===0){
    const fLabel={all:'',traveling:' em viagem',parked:' disponível',maintenance:' em manutenção',offline:' offline'}[state.statusFilter]||'';
    const gLabel=state.groupFilter?` no grupo ${state.groupFilter}`:'';
    body.innerHTML=`<div class="empty-state"><i class="fa-solid fa-truck-fast"></i><p>Nenhum veículo${fLabel}${gLabel}</p><p style="font-size:10px;margin-top:4px;opacity:.7">Ajuste os filtros para ver mais veículos</p></div>`;
    return;
  }

  const DOT_CLASS={traveling:'dot-traveling',parked:'dot-parked',maintenance:'dot-maintenance',offline:'dot-offline'};
  const STATUS_SLBL={traveling:'Em Viagem',parked:'Disponível',maintenance:'Manutenção',offline:'Sem Sinal'};
  const SLBL_CLS={traveling:'slbl slbl-green',parked:'slbl slbl-blue',maintenance:'slbl slbl-amber',offline:'slbl slbl-gray'};

  body.innerHTML=list.map(v=>{
    const fColor=fuelColor(v.fuel);
    const isSelected=v.id===state.selectedId;
    const dotCls=DOT_CLASS[v.status]||'dot-offline';

    // classe da borda lateral: fuel crítico prevalece sobre status
    const isFuelCrit=v.fuel<20&&v.status!=='maintenance'&&v.status!=='offline';
    const rowClass=isFuelCrit?'fuel-critical':`status-${v.status}`;

    // speed chip para veículos em viagem
    let speedHtml='';
    if(v.status==='traveling'){
      if(v.speed>0){
        const cls=v.speed>80?'fast':'moving';
        speedHtml=`<span class="speed-chip ${cls}"><i class="fa-solid fa-gauge-simple-high" style="font-size:7px"></i>&nbsp;${v.speed}&nbsp;km/h</span>`;
      } else {
        speedHtml=`<span class="speed-chip stopped">parado</span>`;
      }
    }

    // temp chip para carga fria / controlada
    const tempOk=v.temperature!==null&&v.temperature<=8;
    const tempHtml=v.temperature!==null
      ?`<span class="temp-chip${!tempOk?' warn':''}"><i class="fa-solid fa-snowflake" style="font-size:7px"></i>&nbsp;${v.temperature.toFixed(1)}°C</span>`
      :'';

    return `
    <div class="vrow ${rowClass}${isSelected?' selected':''}" onclick="selectVehicle('${v.id}')">
      <div class="vr-status"><div class="rc-dot ${dotCls}"></div></div>
      <div class="vr-vehicle">
        <div class="vr-plate-row">
          <span class="vr-plate">${v.plate}</span>
          ${tempHtml}
        </div>
        <div class="vr-model-row">
          <span class="vr-model">${v.model.split(' ').slice(0,2).join(' ')}</span>
          ${speedHtml}
        </div>
      </div>
      <div class="vr-driver">
        <div class="vr-dname">${v.driver.split(' ').slice(0,2).join(' ')}</div>
      </div>
      <div class="vr-statuslbl">
        <span class="${SLBL_CLS[v.status]||'slbl slbl-gray'}">${STATUS_SLBL[v.status]||'—'}</span>
      </div>
      <div class="vr-fuel">
        <div class="fuel-bar-wrap">
          <div class="fuel-bar"><div class="fuel-fill" style="width:${v.fuel}%;background:${fColor}"></div></div>
          <span class="fuel-val" style="color:${fColor}">${v.fuel}%</span>
        </div>
      </div>
      <div class="vr-updated">${v.lastUpdate}</div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════════
   MAPA
════════════════════════════════════════════════════════════════════ */
let map=null,markers={};

function initMap(){
  map=L.map('fleet-map',{center:[-15,-50],zoom:5,zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  L.control.attribution({position:'bottomright'}).addAttribution('&copy; <a href="https://carto.com">CARTO</a>').addTo(map);
  renderMarkers();
}

function markerColor(status){
  if(status==='traveling') return '#16a34a';
  if(status==='parked') return '#2563eb';
  if(status==='maintenance') return '#d97706';
  return '#9CA3AF';
}

function renderMarkers(){
  if(!map) return;
  const list=getFiltered();
  const visibleIds=new Set(list.map(v=>v.id));
  Object.keys(markers).forEach(id=>{if(!visibleIds.has(id)){markers[id].remove();delete markers[id];}});
  list.forEach(v=>{
    const color=markerColor(v.status);
    const isSelected=v.id===state.selectedId;
    const radius=isSelected?11:8,weight=isSelected?3:2;
    if(markers[v.id]){
      const m=markers[v.id];
      m.setLatLng([v.lat,v.lng]);
      m.setStyle({fillColor:color,color:'#fff',weight,radius});
    } else {
      const circle=L.circleMarker([v.lat,v.lng],{radius,fillColor:color,fillOpacity:1,color:'#fff',weight});
      const subLabel=v.subStatus?` · ${SUBSTATUS_LABEL[v.subStatus]}`:'';
      circle.bindTooltip(`<strong>${v.plate}</strong><br>${v.driver}<br>${STATUS_LABEL[v.status]}${subLabel}`,
        {permanent:false,direction:'top',offset:[0,-8]});
      circle.on('click',()=>selectVehicle(v.id));
      circle.addTo(map);
      markers[v.id]=circle;
    }
  });
}

function flyToVehicle(v){if(!map) return;map.flyTo([v.lat,v.lng],12,{duration:1.2,easeLinearity:0.25});}

/* ═══════════════════════════════════════════════════════════════════
   SELEÇÃO DE VEÍCULO
════════════════════════════════════════════════════════════════════ */
function selectVehicle(id){
  state.selectedId=id;
  const v=VEHICLES.find(x=>x.id===id);
  if(!v) return;
  renderTable();renderMarkers();renderPanel(v);
  document.getElementById('detail-panel').classList.add('open');
  if(map&&(state.viewMode==='split'||state.viewMode==='map')) flyToVehicle(v);
}

function closePanel(){
  state.selectedId=null;
  document.getElementById('detail-panel').classList.remove('open');
  renderTable();renderMarkers();
}

/* ═══════════════════════════════════════════════════════════════════
   FILTROS & ORDENAÇÃO
════════════════════════════════════════════════════════════════════ */
function handleSearch(val){state.search=val;render();}
function handleGroupChange(val){state.groupFilter=val;render();}

function setStatusFilter(f){
  state.statusFilter=f===state.statusFilter?'all':f;
  state.subStatusFilter='';
  document.getElementById('substatus-chips').style.display=state.statusFilter==='traveling'?'flex':'none';
  document.querySelectorAll('.kpi[data-filter]').forEach(el=>{
    el.setAttribute('aria-pressed',el.dataset.filter===state.statusFilter?'true':'false');
  });
  document.querySelectorAll('.ss-chip').forEach(el=>el.classList.remove('active'));
  render();
}

function setSubStatusFilter(ss){
  state.subStatusFilter=state.subStatusFilter===ss?'':ss;
  document.querySelectorAll('.ss-chip').forEach(el=>{
    el.classList.toggle('active',el.dataset.ss===state.subStatusFilter);
  });
  render();
}

function handleSort(field){
  state.sortDir=state.sortField===field?(state.sortDir==='asc'?'desc':'asc'):'asc';
  state.sortField=field;
  ['plate','driver','fuel','lastUpdate'].forEach(f=>{
    const el=document.getElementById(`sort-${f}`);
    if(!el) return;
    el.className='fa-solid '+(state.sortField===f?(state.sortDir==='asc'?'fa-sort-up':'fa-sort-down'):'fa-sort');
    el.parentElement.classList.toggle('sorted',state.sortField===f);
  });
  renderTable();
}

/* ═══════════════════════════════════════════════════════════════════
   VIEW MODE
════════════════════════════════════════════════════════════════════ */
function setViewMode(mode){
  state.viewMode=mode;
  const app=document.getElementById('app');
  app.classList.remove('view-split','view-table','view-map');
  app.classList.add(`view-${mode}`);
  ['split','table','map'].forEach(m=>document.getElementById(`vt-${m}`).classList.toggle('active',m===mode));
  if(map) setTimeout(()=>map.invalidateSize(),280);
}

/* ═══════════════════════════════════════════════════════════════════
   REFRESH
════════════════════════════════════════════════════════════════════ */
function handleRefresh(){
  const btn=document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'),900);
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER PRINCIPAL
