<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Controle — Comunicação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060A12;--s1:#0C1422;--s2:#111A2E;--s3:#182038;--s4:#1E2A45;--s5:#243050;
  --border:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--b3:rgba(255,255,255,.16);
  --t1:#E8EDF8;--t2:#8A9ABE;--t3:#4E5F88;--t4:#2E3D60;
  --blue:#3D72FF;--blue-s:rgba(61,114,255,.14);--blue-m:rgba(61,114,255,.26);
  --red:#FF2D55;--red-s:rgba(255,45,85,.12);
  --amber:#FF9F0A;--amber-s:rgba(255,159,10,.12);
  --green:#30D158;--green-s:rgba(48,209,88,.12);
  --wpp:#25D366;--wpp-s:rgba(37,211,102,.12);
  --purple:#BF5AF2;--purple-s:rgba(191,90,242,.12);
  --f-d:'Barlow Condensed',sans-serif;
  --f-u:'DM Sans',sans-serif;
  --f-m:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--f-u)}
.app{display:flex;height:100vh}

.sidebar{width:56px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;z-index:10}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3D72FF,#00C7FF);display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-weight:900;font-size:15px;color:#fff;margin-bottom:16px;flex-shrink:0;box-shadow:0 0 20px rgba(61,114,255,.4)}
.nav-sep{width:24px;height:1px;background:var(--border);margin:8px 0}
.nav-item{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;color:var(--t3);transition:all .15s;position:relative}
.nav-item:hover{background:var(--s2);color:var(--t2)}
.nav-item.active{background:var(--wpp-s);color:var(--wpp)}
.nav-item.active::before{content:'';position:absolute;left:-1px;top:8px;bottom:8px;width:2px;border-radius:0 2px 2px 0;background:var(--wpp)}
.nav-badge{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--s1)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.topbar{height:64px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px}
.topbar-title{font-family:var(--f-d);font-weight:700;font-size:18px;letter-spacing:.03em;text-transform:uppercase;color:var(--t2);line-height:1}
.topbar-title span{color:var(--t1)}
.topbar-sub{font-size:10px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.topbar-divider{width:1px;height:32px;background:var(--border);flex-shrink:0}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--wpp);box-shadow:0 0 8px var(--wpp);animation:lp 2s ease-in-out infinite;flex-shrink:0}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}
.ts{font-family:var(--f-m);font-size:11px;color:var(--t3)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}

/* channel tabs */
.channel-strip{height:44px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:4px}
.ch-tab{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--t3);border:1px solid transparent;transition:all .15s}
.ch-tab:hover{background:var(--s2);color:var(--t2)}
.ch-tab.active{background:var(--s2);border-color:var(--b2);color:var(--t1)}
.ch-tab.active.wpp{color:var(--wpp);border-color:rgba(37,211,102,.3);background:var(--wpp-s)}
.ch-tab.active.email{color:var(--blue);border-color:rgba(61,114,255,.3);background:var(--blue-s)}
.ch-tab.active.auto{color:var(--amber);border-color:rgba(255,159,10,.3);background:var(--amber-s)}
.ch-count{font-family:var(--f-m);font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:var(--s3)}

/* workspace */
.workspace{flex:1;display:flex;overflow:hidden}

/* conversations rail */
.conv-rail{width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--s1)}
.rail-search{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-box{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 10px}
.search-box input{background:none;border:none;outline:none;font-size:12px;color:var(--t1);font-family:var(--f-u);width:100%}
.search-box input::placeholder{color:var(--t3)}

.conv-list{flex:1;overflow-y:auto;padding:6px}
.conv-list::-webkit-scrollbar{width:3px}
.conv-list::-webkit-scrollbar-thumb{background:var(--s3)}

.conv-item{padding:10px 12px;border-radius:9px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:3px;position:relative}
.conv-item:hover{background:var(--s2);border-color:var(--border)}
.conv-item.selected{background:var(--s3);border-color:var(--b2)}
.conv-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.conv-avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.conv-name{font-size:12px;font-weight:600;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-family:var(--f-m);font-size:9px;color:var(--t3)}
.conv-preview{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:40px}
.conv-badge{position:absolute;top:10px;right:10px;min-width:16px;height:16px;border-radius:8px;background:var(--red);font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px}
.conv-sm-tag{font-family:var(--f-m);font-size:9px;color:var(--t3);padding-left:40px;margin-top:2px}
.unread-dot{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--wpp)}

/* chat area */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}

.chat-header{
  padding:12px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--s1);
}
.chat-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
.chat-meta{flex:1}
.chat-name{font-size:14px;font-weight:700;color:var(--t1)}
.chat-sub{font-size:11px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:8px}
.chat-sm{font-family:var(--f-m);font-size:10px;color:var(--blue)}
.chat-actions{display:flex;gap:6px}
.action-btn{height:30px;padding:0 12px;border-radius:7px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;font-family:var(--f-u)}
.action-btn:hover{background:var(--s3);color:var(--t1)}
.action-btn.primary{background:var(--wpp-s);border-color:rgba(37,211,102,.3);color:var(--wpp)}

/* messages */
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--s3)}

.msg-group{display:flex;flex-direction:column;gap:4px}
.msg-date-sep{display:flex;align-items:center;gap:10px;margin:8px 0;color:var(--t3);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.msg-date-sep::before,.msg-date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.out{flex-direction:row-reverse}
.msg-bubble{
  max-width:70%;padding:9px 13px;border-radius:12px;
  font-size:12px;line-height:1.5;position:relative;
}
.msg-row.in .msg-bubble{background:var(--s3);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--t1)}
.msg-row.out .msg-bubble{background:var(--wpp-s);border:1px solid rgba(37,211,102,.2);border-bottom-right-radius:4px;color:var(--t1)}
.msg-row.out.email .msg-bubble{background:var(--blue-s);border-color:rgba(61,114,255,.2)}
.msg-row.out.sistema .msg-bubble{background:var(--s2);border-color:var(--border);color:var(--t2)}
.msg-meta{font-size:9px;color:var(--t3);white-space:nowrap;text-align:right;margin-top:3px;display:flex;align-items:center;gap:5px;justify-content:flex-end}
.msg-row.in .msg-meta{justify-content:flex-start}
.msg-check{color:var(--wpp);font-size:10px}
.msg-channel-badge{font-size:8px;font-weight:600;padding:1px 5px;border-radius:3px}
.bc-wpp{background:var(--wpp-s);color:var(--wpp)}
.bc-email{background:var(--blue-s);color:var(--blue)}
.bc-sys{background:var(--s4);color:var(--t3)}
.msg-sender-name{font-size:9px;color:var(--t3);font-weight:600;margin-bottom:2px}

.msg-avatar-sm{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-weight:700;font-size:10px;color:#fff;flex-shrink:0}

/* system event */
.sys-event{
  display:flex;align-items:center;gap:8px;padding:6px 12px;
  background:var(--s2);border:1px solid var(--border);border-radius:7px;
  font-size:11px;color:var(--t3);align-self:center;
}
.sys-event-icon{font-size:12px}

/* composer */
.composer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--s1)}
.template-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;padding:8px;background:var(--s2);border-radius:8px;border:1px solid var(--border)}
.template-bar-label{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);width:100%;margin-bottom:4px}
.tpl-btn{font-size:10px;font-weight:500;padding:4px 10px;border-radius:6px;background:var(--s3);border:1px solid var(--b2);color:var(--t2);cursor:pointer;transition:all .15s;font-family:var(--f-u)}
.tpl-btn:hover{border-color:var(--wpp);color:var(--wpp);background:var(--wpp-s)}
.composer-input-row{display:flex;align-items:flex-end;gap:8px}
.composer-box{
  flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:10px;
  padding:9px 13px;font-size:13px;color:var(--t1);font-family:var(--f-u);
  outline:none;resize:none;min-height:40px;max-height:100px;transition:border-color .15s;
}
.composer-box:focus{border-color:var(--wpp)}
.composer-box::placeholder{color:var(--t3)}
.send-btn{
  width:40px;height:40px;border-radius:10px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  background:var(--wpp);color:#fff;transition:all .15s;flex-shrink:0;
}
.send-btn:hover{background:#1ea84e;transform:scale(1.05)}
.composer-channel{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.ch-sel{font-size:10px;font-weight:600;padding:3px 10px;border-radius:5px;cursor:pointer;border:1px solid var(--border);color:var(--t3);background:transparent;transition:all .15s}
.ch-sel.active-wpp{background:var(--wpp-s);border-color:rgba(37,211,102,.3);color:var(--wpp)}
.ch-sel.active-email{background:var(--blue-s);border-color:rgba(61,114,255,.3);color:var(--blue)}

/* right panel */
.right-panel{width:260px;flex-shrink:0;border-left:1px solid var(--border);background:var(--s1);overflow-y:auto;display:flex;flex-direction:column}
.right-panel::-webkit-scrollbar{width:3px}
.right-panel::-webkit-scrollbar-thumb{background:var(--s3)}
.rp-section{padding:14px;border-bottom:1px solid var(--border)}
.rp-title{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rp-title::before{content:'';width:3px;height:10px;border-radius:2px;background:currentColor}
.sm-mini-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.sm-mini-id{font-family:var(--f-m);font-size:11px;font-weight:600;color:var(--blue);margin-bottom:3px}
.sm-mini-route{font-size:11px;color:var(--t2);margin-bottom:5px}
.sm-mini-stat{display:flex;align-items:center;gap:6px}
.sm-mini-badge{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:11px;color:var(--t2)}
.stat-val{font-family:var(--f-m);font-size:11px;font-weight:600;color:var(--t1)}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="logo">TC</div>
    <div class="nav-item">🏠</div>
    <div class="nav-item">🗺️<div class="nav-badge"></div></div>
    <div class="nav-sep"></div>
    <div class="nav-item">📊</div>
    <div class="nav-item">🚛</div>
    <div class="nav-item active">💬</div>
    <div class="nav-item">📋</div>
    <div class="nav-sep"></div>
    <div class="nav-item" style="margin-top:auto">⚙️</div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Torre de <span>Controle</span></div>
        <div class="topbar-sub">Comunicação Integrada</div>
      </div>
      <div class="topbar-divider"></div>
      <div class="topbar-right">
        <div class="live-dot"></div>
        <div class="ts" id="clock">--:--:--</div>
      </div>
    </div>

    <!-- Channel strip -->
    <div class="channel-strip">
      <div class="ch-tab active wpp" onclick="setChannel(this,'wpp')">💬 WhatsApp <span class="ch-count" style="color:var(--wpp)">12</span></div>
      <div class="ch-tab" onclick="setChannel(this,'email')">📧 E-mail <span class="ch-count">38</span></div>
      <div class="ch-tab" onclick="setChannel(this,'auto')">⚡ Automáticos <span class="ch-count">94</span></div>
      <div style="margin-left:auto;font-size:10px;font-weight:600;color:var(--t3)">Total hoje: <span style="color:var(--t1)">144</span> mensagens</div>
    </div>

    <div class="workspace">
      <!-- Conversations rail -->
      <div class="conv-rail">
        <div class="rail-search">
          <div class="search-box">
            <span style="font-size:11px;color:var(--t3)">🔍</span>
            <input placeholder="Buscar conversa, SM, motorista…">
          </div>
        </div>
        <div class="conv-list" id="conv-list"></div>
      </div>

      <!-- Chat area -->
      <div class="chat-area">
        <div class="chat-header" id="chat-header"></div>
        <div class="messages" id="messages"></div>
        <div class="composer">
          <div class="composer-channel">
            <span style="font-size:10px;color:var(--t3);margin-right:4px">Enviar via:</span>
            <div class="ch-sel active-wpp" onclick="setComposerCh(this,'wpp')">💬 WhatsApp</div>
            <div class="ch-sel" onclick="setComposerCh(this,'email')">📧 Email</div>
          </div>
          <div class="template-bar">
            <div class="template-bar-label">Templates rápidos</div>
            <div class="tpl-btn" onclick="useTemplate('📍 Solicitar posição atual do veículo')">📍 Solicitar posição</div>
            <div class="tpl-btn" onclick="useTemplate('⏰ Atenção: sua janela de entrega está próxima do fechamento.')">⏰ Alertar janela</div>
            <div class="tpl-btn" onclick="useTemplate('📄 Por favor, envie foto do canhoto assinado.')">📄 Pedir canhoto</div>
            <div class="tpl-btn" onclick="useTemplate('🔄 Confirmar status da entrega atual.')">🔄 Confirmar entrega</div>
            <div class="tpl-btn" onclick="useTemplate('🚨 Acionar equipe de suporte em campo.')">🚨 Acionar suporte</div>
          </div>
          <div class="composer-input-row">
            <textarea class="composer-box" id="composer" placeholder="Digite a mensagem…" rows="1"></textarea>
            <button class="send-btn" onclick="sendMsg()">↑</button>
          </div>
        </div>
      </div>

      <!-- Right panel -->
      <div class="right-panel" id="right-panel"></div>
    </div>
  </div>
</div>

      {dir:'in',text:'Relatório de OTIF recebido. Obrigada! Muito bom o resultado dessa semana.',time:'10:30',sender:'Ana Beatriz'},
    ]
  },
];

let selectedConv = CONVS[0];
let composerChannel = 'wpp';

/* ═══ CLOCK ════════════════════════════════════════════════════ */
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR')}
setInterval(updateClock,1000);updateClock();

/* ═══ RENDER RAIL ═══════════════════════════════════════════════ */
function renderRail(){
  const statusColors={em_rota:'var(--green)',parado:'var(--red)',aguardando:'var(--amber)',cliente:'var(--blue)'};
  document.getElementById('conv-list').innerHTML = CONVS.map(c=>`
    <div class="conv-item${c.id===selectedConv.id?' selected':''}" onclick="selectConv('${c.id}')">
      ${c.unread?`<div class="unread-dot"></div>`:''}
      <div class="conv-top">
        <div class="conv-avatar" style="background:${c.color}">${c.initials}</div>
        <div class="conv-name">${c.name}</div>
        <div class="conv-time">${c.time}</div>
        ${c.unread?`<div class="conv-badge">${c.unread}</div>`:''}
      </div>
      <div class="conv-preview">${c.preview}</div>
      ${c.smId?`<div class="conv-sm-tag">${c.smId} · ${c.client}</div>`:''}
    </div>
  `).join('');
}

/* ═══ SELECT CONV ═══════════════════════════════════════════════ */
function selectConv(id){
  selectedConv = CONVS.find(c=>c.id===id);
  selectedConv.unread=0;
  renderRail();
  renderChat();
  renderRightPanel();
}

/* ═══ RENDER CHAT ═══════════════════════════════════════════════ */
function renderChat(){
  const c = selectedConv;
  const statusLabel={em_rota:'Em rota',parado:'Parado',aguardando:'Aguardando',cliente:'Cliente'};
  const statusColor={em_rota:'var(--green)',parado:'var(--red)',aguardando:'var(--amber)',cliente:'var(--blue)'};

  document.getElementById('chat-header').innerHTML=`
    <div class="chat-avatar" style="background:${c.color}">${c.initials}</div>
    <div class="chat-meta">
      <div class="chat-name">${c.name}</div>
      <div class="chat-sub">
        ${c.smId?`<span class="chat-sm">${c.smId}</span>`:''}
        ${c.route?`<span>${c.route}</span>`:''}
        ${c.status?`<span style="color:${statusColor[c.status]}">${statusLabel[c.status]}</span>`:''}
      </div>
    </div>
    <div class="chat-actions">
      <button class="action-btn">📍 Localizar</button>
      <button class="action-btn">🗺️ Ver SM</button>
      <button class="action-btn primary">+ Acionar suporte</button>
    </div>
  `;

  const msgsEl = document.getElementById('messages');
  msgsEl.innerHTML = '';

  // Date separator
  const sep = document.createElement('div');
  sep.className = 'msg-date-sep';
  sep.textContent = 'Hoje — 07 de Abril, 2026';
  msgsEl.appendChild(sep);

  c.messages.forEach(m=>{
    if(m.type==='sistema'){
      const ev=document.createElement('div');
      ev.className='sys-event';
      ev.innerHTML=`<span class="sys-event-icon">⚡</span><span>${m.text}</span><span class="conv-time" style="margin-left:auto">${m.time}</span>`;
      msgsEl.appendChild(ev);
      return;
    }
    const isOut=m.dir==='out';
    const chCls=m.type==='email'?' email':'';
    const row=document.createElement('div');
    row.className=`msg-row${isOut?' out'+chCls:' in'}`;
    const channelBadge=m.type==='email'?`<span class="msg-channel-badge bc-email">Email</span>`
      :`<span class="msg-channel-badge bc-wpp">WPP</span>`;
    const checks=isOut?`<span class="msg-check">✓✓</span>`:'';
    if(!isOut){
      const av=document.createElement('div');
      av.className='msg-avatar-sm';
      av.style.background=c.color;
      av.textContent=c.initials;
      row.appendChild(av);
    }
    const bubble=document.createElement('div');
    bubble.innerHTML=`
      ${isOut&&m.sender?`<div class="msg-sender-name" style="text-align:right">${m.sender}</div>`:''}
      <div class="msg-bubble">${m.text}</div>
      <div class="msg-meta">${checks} ${channelBadge} ${m.time}</div>
    `;
    row.appendChild(bubble);
    msgsEl.appendChild(row);
  });
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

/* ═══ RENDER RIGHT PANEL ════════════════════════════════════════ */
function renderRightPanel(){
  const c=selectedConv;
  const rp=document.getElementById('right-panel');
  if(!c.smId){
    rp.innerHTML=`
      <div class="rp-section">
        <div class="rp-title" style="color:var(--blue)">Cliente</div>
        <div class="sm-mini-card">
          <div class="sm-mini-id">${c.client}</div>
          <div class="sm-mini-route" style="color:var(--t2)">Conversa de relacionamento</div>
        </div>
      </div>
      <div class="rp-section">
        <div class="rp-title">Estatísticas do período</div>
        ${[
          {lbl:'SMs realizadas',val:'148'},
          {lbl:'OTIF',val:'91,2%'},
          {lbl:'Msgs enviadas',val:'342'},
        ].map(s=>`<div class="stat-row"><div class="stat-lbl">${s.lbl}</div><div class="stat-val">${s.val}</div></div>`).join('')}
      </div>
    `;
    return;
  }
  rp.innerHTML=`
    <div class="rp-section">
      <div class="rp-title" style="color:var(--blue)">SM vinculada</div>
      <div class="sm-mini-card">
        <div class="sm-mini-id">${c.smId}</div>
        <div class="sm-mini-route">${c.route}</div>
        <div class="sm-mini-stat">
          <span class="sm-mini-badge" style="background:${c.status==='parado'?'var(--red-s)':'var(--green-s)'};color:${c.status==='parado'?'var(--red)':'var(--green)'}">
            ${c.status==='parado'?'Parado':'Em rota'}
          </span>
          <span style="font-size:10px;color:var(--t3)">${c.client}</span>
        </div>
      </div>
    </div>
    <div class="rp-section">
      <div class="rp-title">Info da viagem</div>
      ${[
        {lbl:'Motorista',val:c.name.split(' ')[0]+' '+c.name.split(' ')[1]},
        {lbl:'Status',val:c.status==='parado'?'⚠️ Parado':'▶ Em rota'},
        {lbl:'Últ. sinal',val:c.status==='parado'?'45min atrás':'2min atrás'},
        {lbl:'ETA',val:c.smId==='SM-984553'?'13:15 (+2h)':'14:32'},
      ].map(s=>`<div class="stat-row"><div class="stat-lbl">${s.lbl}</div><div class="stat-val">${s.val}</div></div>`).join('')}
    </div>
    <div class="rp-section">
      <div class="rp-title">Histórico desta SM</div>
      ${[
        {lbl:'Msgs enviadas',val:'8'},
        {lbl:'Respostas',val:'4'},
        {lbl:'Alertas auto',val:'2'},
      ].map(s=>`<div class="stat-row"><div class="stat-lbl">${s.lbl}</div><div class="stat-val">${s.val}</div></div>`).join('')}
    </div>
  `;
}

/* ═══ SEND ══════════════════════════════════════════════════════ */
function sendMsg(){
  const box=document.getElementById('composer');
  const text=box.value.trim();
  if(!text) return;
  const now=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  selectedConv.messages.push({dir:'out',type:composerChannel,text,time:now,sender:'Torre'});
  box.value='';
  renderChat();
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('composer').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}
  });
});

/* ═══ TEMPLATES ═════════════════════════════════════════════════ */
function useTemplate(text){
  document.getElementById('composer').value=text;
  document.getElementById('composer').focus();
}

/* ═══ CHANNEL ═══════════════════════════════════════════════════ */
function setChannel(el,ch){
  document.querySelectorAll('.ch-tab').forEach(t=>{t.className='ch-tab';});
  el.classList.add('active',ch);
}
function setComposerCh(el,ch){
  composerChannel=ch;
  document.querySelectorAll('.ch-sel').forEach(b=>{b.className='ch-sel'});
  el.classList.add(ch==='wpp'?'active-wpp':'active-email');
  document.querySelector('.send-btn').style.background=ch==='wpp'?'var(--wpp)':'var(--blue)';
}

/* ═══ BOOT ══════════════════════════════════════════════════════ */
renderRail();
renderChat();
renderRightPanel();
</script>
</body>
</html>
