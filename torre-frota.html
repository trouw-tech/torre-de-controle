<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Controle — Frota</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060A12;--s1:#0C1422;--s2:#111A2E;--s3:#182038;--s4:#1E2A45;
  --border:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--b3:rgba(255,255,255,.15);
  --t1:#E8EDF8;--t2:#8A9ABE;--t3:#4E5F88;--t4:#2E3D60;
  --blue:#3D72FF;--blue-s:rgba(61,114,255,.14);--blue-m:rgba(61,114,255,.24);
  --red:#FF2D55;--red-s:rgba(255,45,85,.12);
  --amber:#FF9F0A;--amber-s:rgba(255,159,10,.12);
  --green:#30D158;--green-s:rgba(48,209,88,.12);
  --cyan:#00C7FF;--cyan-s:rgba(0,199,255,.12);
  --purple:#BF5AF2;--purple-s:rgba(191,90,242,.12);
  --orange:#FF6B00;--orange-s:rgba(255,107,0,.12);
  --f-d:'Barlow Condensed',sans-serif;
  --f-u:'DM Sans',sans-serif;
  --f-m:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--f-u)}
.app{display:flex;height:100vh}

/* sidebar */
.sidebar{width:56px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;z-index:10}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3D72FF,#00C7FF);display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-weight:900;font-size:15px;color:#fff;margin-bottom:16px;flex-shrink:0;box-shadow:0 0 20px rgba(61,114,255,.4)}
.nav-sep{width:24px;height:1px;background:var(--border);margin:8px 0}
.nav-item{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;color:var(--t3);transition:all .15s;position:relative}
.nav-item:hover{background:var(--s2);color:var(--t2)}
.nav-item.active{background:var(--purple-s);color:var(--purple)}
.nav-item.active::before{content:'';position:absolute;left:-1px;top:8px;bottom:8px;width:2px;border-radius:0 2px 2px 0;background:var(--purple)}
.nav-badge{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--amber);border:1.5px solid var(--s1)}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* topbar */
.topbar{height:64px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px}
.topbar-left{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.topbar-title{font-family:var(--f-d);font-weight:700;font-size:18px;letter-spacing:.03em;text-transform:uppercase;color:var(--t2);line-height:1}
.topbar-title span{color:var(--t1)}
.topbar-sub{font-size:10px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase}
.topbar-divider{width:1px;height:32px;background:var(--border);flex-shrink:0}
.view-toggle{display:flex;gap:3px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:3px}
.vt-btn{font-size:11px;font-weight:600;padding:4px 12px;border-radius:5px;cursor:pointer;color:var(--t3);transition:all .15s;font-family:var(--f-u)}
.vt-btn:hover{color:var(--t2)}
.vt-btn.active{background:var(--s4);color:var(--t1)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.ts{font-family:var(--f-m);font-size:11px;color:var(--t3)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:lp 2s ease-in-out infinite;flex-shrink:0}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}

/* search bar */
.search-bar{
  height:48px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:12px;
}
.search-input-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:6px 12px;flex:0 0 280px;
}
.search-input{background:none;border:none;outline:none;font-size:12px;color:var(--t1);font-family:var(--f-u);width:100%}
.search-input::placeholder{color:var(--t3)}
.search-icon{font-size:12px;color:var(--t3);flex-shrink:0}
.filter-chips{display:flex;gap:6px;align-items:center}
.fchip{font-size:10px;font-weight:600;letter-spacing:.04em;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--border);color:var(--t3);background:transparent;transition:all .15s}
.fchip:hover{color:var(--t2);background:var(--s2)}
.fchip.active{border-color:var(--b2);color:var(--t1);background:var(--s2)}
.fchip.danger.active{background:var(--red-s);border-color:rgba(255,45,85,.3);color:var(--red)}
.fchip.warn.active{background:var(--amber-s);border-color:rgba(255,159,10,.3);color:var(--amber)}
.fchip.ok.active{background:var(--green-s);border-color:rgba(48,209,88,.3);color:var(--green)}
.sort-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t3)}
.sort-select{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--t2);font-family:var(--f-u);cursor:pointer;outline:none}

/* workspace */
.workspace{flex:1;display:flex;overflow:hidden}

/* fleet list */
.fleet-list{width:420px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:12px}
.fleet-list::-webkit-scrollbar{width:4px}
.fleet-list::-webkit-scrollbar-thumb{background:var(--s3)}

/* kpi strip */
.fleet-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.fkpi{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;position:relative;overflow:hidden}
.fkpi-val{font-family:var(--f-d);font-weight:900;font-size:30px;line-height:1}
.fkpi-lbl{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-top:3px}
.fkpi-bar{position:absolute;bottom:0;left:0;right:0;height:2px}

/* vehicle card */
.vehicle-card{
  background:var(--s2);border:1px solid var(--border);border-radius:10px;
  margin-bottom:8px;cursor:pointer;transition:all .18s;overflow:hidden;
}
.vehicle-card:hover{border-color:var(--b2);background:var(--s3)}
.vehicle-card.selected{border-color:var(--purple);background:var(--s3);box-shadow:0 0 0 1px var(--purple),inset 0 0 40px var(--purple-s)}
.vc-top{padding:12px 14px;display:flex;align-items:flex-start;gap:12px}
.vc-icon-wrap{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;
}
.vc-meta{flex:1}
.vc-row1{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.vc-plate{font-family:var(--f-m);font-size:13px;font-weight:600;color:var(--t1)}
.vc-type{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:4px;background:var(--s1);border:1px solid var(--border);color:var(--t3)}
.vc-status{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:4px}
.vcs-rota{background:var(--green-s);color:var(--green)}
.vcs-manut{background:var(--amber-s);color:var(--amber)}
.vcs-disp{background:var(--blue-s);color:var(--blue)}
.vcs-reserva{background:var(--purple-s);color:var(--purple)}
.vcs-terceiro{background:var(--orange-s);color:var(--orange)}
.vc-model{font-size:12px;color:var(--t2)}
.vc-driver{font-size:11px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:5px}
.driver-score-sm{font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px}
.vc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.risk-ring{
  width:36px;height:36px;position:relative;display:flex;align-items:center;justify-content:center;
}
.risk-ring svg{position:absolute;inset:0}
.risk-num{font-family:var(--f-d);font-weight:700;font-size:13px;position:relative;z-index:1}
.pred-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--amber-s);color:var(--amber);text-align:center}

.vc-stats{
  padding:8px 14px 10px;border-top:1px solid var(--border);
  display:flex;gap:0;
}
.vc-stat{flex:1;display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--border)}
.vc-stat:last-child{border-right:none}
.vc-stat-val{font-family:var(--f-m);font-size:11px;font-weight:600;color:var(--t1);padding:0 10px}
.vc-stat-lbl{font-size:9px;color:var(--t3);letter-spacing:.04em;padding:0 10px}
.vc-stat:first-child .vc-stat-val{padding-left:0}
.vc-stat:first-child .vc-stat-lbl{padding-left:0}

.vc-alerts{padding:6px 14px 8px;border-top:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap}
.vc-alert-pill{font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--amber-s);color:var(--amber);border:1px solid rgba(255,159,10,.2)}
.vc-alert-pill.danger{background:var(--red-s);color:var(--red);border-color:rgba(255,45,85,.2)}
.vc-alert-pill.info{background:var(--blue-s);color:var(--blue);border-color:rgba(61,114,255,.2)}

/* detail panel */
.detail-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.detail-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;color:var(--t3);
}
.detail-empty-icon{font-size:40px;opacity:.3}
.detail-empty-text{font-size:13px}

.detail-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.detail-header{
  padding:16px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;flex-shrink:0;background:var(--s1);
}
.dh-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.dh-meta{flex:1}
.dh-plate{font-family:var(--f-m);font-size:18px;font-weight:600;color:var(--t1);margin-bottom:4px}
.dh-model{font-size:13px;color:var(--t2)}
.dh-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.dh-badge{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 10px;border-radius:5px}
.dh-actions{display:flex;gap:8px}
.dh-btn{height:34px;padding:0 14px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;font-family:var(--f-u)}
.dh-btn:hover{background:var(--s3);color:var(--t1)}
.dh-btn.primary{background:var(--blue-s);border-color:rgba(61,114,255,.3);color:var(--blue)}
.dh-btn.primary:hover{background:var(--blue-m)}

.detail-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;background:var(--s1);flex-shrink:0}
.dtab{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.dtab:hover{color:var(--t2)}
.dtab.active{color:var(--purple);border-color:var(--purple)}

.detail-body{flex:1;overflow-y:auto;padding:20px 24px;display:none}
.detail-body.active{display:block}
.detail-body::-webkit-scrollbar{width:4px}
.detail-body::-webkit-scrollbar-thumb{background:var(--s3)}

/* telemetry grid */
.tele-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.tele-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px}
.tele-lbl{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.tele-val{font-family:var(--f-d);font-weight:900;font-size:28px;line-height:1}
.tele-sub{font-size:10px;color:var(--t3);margin-top:3px}
.tele-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:8px}
.tele-fill{height:100%;border-radius:2px;transition:width .5s}

/* behavior chart */
.behavior-section{margin-bottom:20px}
.section-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.behavior-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.beh-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.beh-icon{font-size:20px;flex-shrink:0}
.beh-info{flex:1}
.beh-val{font-family:var(--f-d);font-weight:700;font-size:22px;line-height:1;margin-bottom:2px}
.beh-lbl{font-size:10px;color:var(--t3)}
.beh-delta{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px}

/* maintenance timeline */
.maint-section{margin-bottom:20px}
.maint-timeline{display:flex;flex-direction:column;gap:8px}
.maint-item{display:flex;gap:14px;align-items:flex-start}
.maint-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.maint-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.maint-connector{width:1px;flex:1;background:var(--border);min-height:20px;margin-top:4px}
.maint-body{flex:1;padding-bottom:12px}
.maint-title{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px}
.maint-sub{font-size:11px;color:var(--t2)}
.maint-meta{display:flex;gap:8px;margin-top:4px;align-items:center}
.maint-date{font-family:var(--f-m);font-size:10px;color:var(--t3)}
.maint-cost{font-size:10px;font-weight:600;color:var(--t2)}
.maint-tag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px}

/* prediction section */
.pred-section{background:rgba(255,159,10,.06);border:1px solid rgba(255,159,10,.2);border-radius:10px;padding:16px;margin-bottom:20px}
.pred-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pred-icon{font-size:18px}
.pred-title{font-size:13px;font-weight:700;color:var(--amber)}
.pred-sub{font-size:11px;color:var(--t2)}
.pred-items{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pred-item{background:rgba(255,159,10,.05);border:1px solid rgba(255,159,10,.15);border-radius:8px;padding:10px 12px}
.pred-item-title{font-size:11px;font-weight:600;color:var(--t1);margin-bottom:2px}
.pred-item-due{font-size:10px;color:var(--amber);font-weight:600}
.pred-item-sub{font-size:10px;color:var(--t3);margin-top:2px}

/* history chart */
.mini-chart{width:100%;height:80px;position:relative;margin-bottom:20px}
.mini-chart svg{width:100%;height:100%}

/* drivers ranking */
.drivers-table{width:100%;border-collapse:collapse}
.drivers-table th{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
.drivers-table td{padding:10px 10px;border-bottom:1px solid var(--border);font-size:12px}
.drivers-table tr:last-child td{border-bottom:none}
.drivers-table tr:hover td{background:var(--s2)}
.score-bar{width:60px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.score-fill{height:100%;border-radius:2px}
.driver-avatar-sm{width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--f-d);font-weight:700;font-size:11px;color:#fff;margin-right:8px;vertical-align:middle}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="logo">TC</div>
    <div class="nav-item">🏠</div>
    <div class="nav-item">🗺️<div class="nav-badge" style="background:var(--red)"></div></div>
    <div class="nav-sep"></div>
    <div class="nav-item">📊</div>
    <div class="nav-item active">🚛</div>
    <div class="nav-item">📋</div>
    <div class="nav-sep"></div>
    <div class="nav-item" style="margin-top:auto">⚙️</div>
  </nav>

  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Torre de <span>Controle</span></div>
        <div class="topbar-sub">Gestão de Frota</div>
      </div>
      <div class="topbar-divider"></div>
      <div class="view-toggle">
        <div class="vt-btn active" onclick="setView(this,'lista')">Lista</div>
        <div class="vt-btn" onclick="setView(this,'mapa')">Mapa</div>
        <div class="vt-btn" onclick="setView(this,'grid')">Grid</div>
      </div>
      <div class="topbar-right">
        <div class="live-dot"></div>
        <div class="ts" id="clock">--:--:--</div>
      </div>
    </div>

    <!-- Search + filters -->
    <div class="search-bar">
      <div class="search-input-wrap">
        <div class="search-icon">🔍</div>
        <input class="search-input" placeholder="Placa, motorista, modelo…" id="search-inp" oninput="filterFleet()">
      </div>
      <div class="filter-chips">
        <div class="fchip active" onclick="setFilter(this,'todos')">Todos <span id="count-todos" style="opacity:.6">31</span></div>
        <div class="fchip ok" onclick="setFilter(this,'em_rota')">Em rota <span id="count-rota" style="opacity:.6">18</span></div>
        <div class="fchip" onclick="setFilter(this,'disponivel')">Disponível <span id="count-disp" style="opacity:.6">7</span></div>
        <div class="fchip warn" onclick="setFilter(this,'manutencao')">Manutenção <span id="count-manut" style="opacity:.6">4</span></div>
        <div class="fchip" onclick="setFilter(this,'reserva')">Reserva <span id="count-res" style="opacity:.6">2</span></div>
        <div class="fchip" onclick="setFilter(this,'terceiro')">Terceiros <span id="count-terc" style="opacity:.6">8</span></div>
      </div>
      <div class="sort-wrap">
        <span>Ordenar:</span>
        <select class="sort-select" onchange="sortFleet(this.value)">
          <option value="risk">Risco ↓</option>
          <option value="plate">Placa A–Z</option>
          <option value="km">KM acumulado</option>
          <option value="status">Status</option>
        </select>
      </div>
    </div>

    <!-- Workspace -->
    <div class="workspace">
      <!-- Fleet list -->
      <div class="fleet-list" id="fleet-list">
        <div class="fleet-kpis" id="fleet-kpis"></div>
        <div id="vehicles-container"></div>
      </div>

      <!-- Detail area -->
      <div class="detail-area" id="detail-area">
        <div class="detail-empty" id="detail-empty">
          <div class="detail-empty-icon">🚛</div>
          <div class="detail-empty-text">Selecione um veículo para ver os detalhes</div>
        </div>
        <div class="detail-content" id="detail-content" style="display:none">
          <div class="detail-header" id="d-header"></div>
          <div class="detail-tabs">
            <div class="dtab active" onclick="switchTab(this,'tab-tele')">Telemetria</div>
            <div class="dtab" onclick="switchTab(this,'tab-manut')">Manutenção</div>
            <div class="dtab" onclick="switchTab(this,'tab-historico')">Histórico</div>
          </div>
          <div class="detail-body active" id="tab-tele"></div>
          <div class="detail-body" id="tab-manut"></div>
          <div class="detail-body" id="tab-historico"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══ DATA ══════════════════════════════════════════════════════ */
const FLEET = [
  {
    id:'v1', plate:'ABC-1D23', model:'Carreta Volvo FH 500', type:'Carreta', icon:'🚛',
    status:'em_rota', own:true,
    driver:'Ricardo Matos', driverScore:71, driverColor:'var(--amber)',
    km:248412, kmToday:248, fuel:62, risk:84,
    client:'Bombril', smActive:'SM-984553',
    alerts:[{text:'Parado fora de rota',type:'danger'},{text:'Manut. prev. em 3d',type:'warn'}],
    tele:{vel:0,rpm:0,temp:82,fuel:62,kmDia:248,kmTotal:248412,freadas:3,curvas:1,excVel:0},

/* ═══ RISK ══════════════════════════════════════════════════════ */
function riskColor(r){return r>=80?'#FF2D55':r>=61?'#FF9F0A':r>=31?'#FF6B00':'#30D158'}
function riskRing(risk){
  if(!risk) return '';
  const r=16,cx=18,cy=18,circ=2*Math.PI*r;
  const dash=circ*(risk/100);
  const color=riskColor(risk);
  return `<div class="risk-ring">
    <svg viewBox="0 0 36 36">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--s3)" stroke-width="3"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
        stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}"
        stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" style="transform:rotate(-90deg);transform-origin:50%"/>
    </svg>
    <div class="risk-num" style="color:${color}">${risk}</div>
  </div>`;
}

/* ═══ RENDER CARDS ══════════════════════════════════════════════ */
function renderCards(){
  const q=currentSearch.toLowerCase();
  const filtered=FLEET.filter(v=>{
    if(currentFilter!=='todos'){
      if(currentFilter==='terceiro' && v.own) return false;
      if(currentFilter!=='terceiro' && !v.own && currentFilter!=='todos') {/* pass */}
      if(currentFilter!=='terceiro' && v.status!==currentFilter && currentFilter!=='todos') return false;
    }
    if(q) return v.plate.toLowerCase().includes(q)||(v.driver&&v.driver.toLowerCase().includes(q))||v.model.toLowerCase().includes(q);
    return true;
  });

  const container=document.getElementById('vehicles-container');
  container.innerHTML='';
  filtered.forEach(v=>{
    const alertsHtml=v.alerts.length?`<div class="vc-alerts">${v.alerts.map(a=>`<span class="vc-alert-pill ${a.type}">${a.text}</span>`).join('')}</div>`:'';
    const scoreHtml=v.driverScore?`<span class="driver-score-sm" style="background:${v.driverColor}22;color:${v.driverColor}">${v.driverScore}</span>`:'';

    const predBadge=v.pred&&v.pred.length?`<div class="pred-badge">⚡ ${v.pred[0].due}</div>`:'';
    const ownBadge=v.own?'':`<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:var(--orange-s);color:var(--orange);font-weight:600">3°</span>`;

    div.innerHTML=`

          <div class="vc-row1">
            <div class="vc-plate">${v.plate}</div>
            <div class="vc-type">${v.type}</div>

/* ═══ SELECT VEHICLE ════════════════════════════════════════════ */
function selectVehicle(id){
  if(selectedId){
    const prev=document.getElementById(`vc-${selectedId}`);
    if(prev) prev.classList.remove('selected');
  }
  selectedId=id;
  const el=document.getElementById(`vc-${id}`);
  if(el){el.classList.add('selected');el.scrollIntoView({behavior:'smooth',block:'nearest'})}
  const v=FLEET.find(x=>x.id===id);
  if(!v) return;
  document.getElementById('detail-empty').style.display='none';
  document.getElementById('detail-content').style.display='flex';
  populateDetail(v);
}

            <td style="font-family:var(--f-m);font-size:10px;color:var(--t3)">${r.date}</td>
            <td><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:${r.otif?'var(--green-s)':'var(--red-s)'};color:${r.otif?'var(--green)':'var(--red)'}">${r.otif?'✓ OK':'✗ Atrasado'}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

/* ═══ MINI CHART ════════════════════════════════════════════════ */
function buildMiniChart(data){
  const W=500,H=60,pad={t:6,r:10,b:20,l:32};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const days=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const valid=data.filter(v=>v!==null);
  if(!valid.length) return '<div style="color:var(--t3);font-size:12px;padding:8px 0">Sem dados no período</div>';
  const minV=Math.min(...valid)-5, maxV=Math.max(...valid)+5;
  const xStep=cW/(data.length-1);
  const yScale=v=>(1-(v-minV)/(maxV-minV))*cH;
  const pts=data.map((v,i)=>v!==null?[pad.l+i*xStep,pad.t+yScale(v)]:null);
  let html=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:60px;overflow:visible">
    <defs><linearGradient id="mg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--purple)" stop-opacity=".2"/>
      <stop offset="100%" stop-color="var(--purple)" stop-opacity="0"/>
    </linearGradient></defs>`;
  const validPts=pts.filter(p=>p!==null);
  if(validPts.length>1){
    const area=`M${validPts[0][0]},${validPts[0][1]} `+validPts.slice(1).map(p=>`L${p[0]},${p[1]}`).join(' ')+` L${validPts[validPts.length-1][0]},${pad.t+cH} L${validPts[0][0]},${pad.t+cH} Z`;
    const line=`M${validPts[0][0]},${validPts[0][1]} `+validPts.slice(1).map(p=>`L${p[0]},${p[1]}`).join(' ');
    html+=`<path d="${area}" fill="url(#mg)"/>`;
    html+=`<path d="${line}" fill="none" stroke="var(--purple)" stroke-width="1.5" stroke-linecap="round"/>`;
    validPts.forEach(([x,y])=>{ html+=`<circle cx="${x}" cy="${y}" r="3" fill="var(--purple)" stroke="var(--s1)" stroke-width="1.5"/>` });
  }
  days.forEach((d,i)=>{
    html+=`<text x="${pad.l+i*xStep}" y="${H-2}" text-anchor="middle" fill="var(--t3)" font-size="9" font-family="var(--f-m)">${d}</text>`;
  });
  html+='</svg>';
  return `<div style="width:100%;height:60px">${html}</div>`;
}

/* ═══ FILTER / SORT ═════════════════════════════════════════════ */
function setFilter(el,val){
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentFilter=val;
  renderCards();
}
function filterFleet(){
  currentSearch=document.getElementById('search-inp').value;
  renderCards();
}
function sortFleet(val){
  if(val==='risk') FLEET.sort((a,b)=>b.risk-a.risk);
  else if(val==='plate') FLEET.sort((a,b)=>a.plate.localeCompare(b.plate));
  else if(val==='km') FLEET.sort((a,b)=>b.km-a.km);
  renderCards();
}
function setView(el,val){
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function switchTab(el,tabId){
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.detail-body').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}
